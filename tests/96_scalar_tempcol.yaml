# Scalar subquery hidden tempcol caching
# For: SELECT (SELECT x FROM b WHERE b.id = a.y) FROM a
# The planner must create a hidden temp column on `a` that caches the scalar
# subquery result per outer row, then rewrite to SELECT .hidden FROM a.
# This avoids re-running the inner scan on repeated query executions.

metadata:
  version: "1.0"
  description: "Scalar subquery caching via hidden temp column on outer table"

setup:
  - sql: "DROP TABLE IF EXISTS sc_a"
  - sql: "DROP TABLE IF EXISTS sc_b"
  - sql: "CREATE TABLE sc_a (id INT, y INT)"
  - sql: "INSERT INTO sc_a (id, y) VALUES (1, 10), (2, 20), (3, 10), (4, NULL)"
  - sql: "CREATE TABLE sc_b (id INT, x VARCHAR(40))"
  - sql: "INSERT INTO sc_b (id, x) VALUES (10, 'Alpha'), (20, 'Beta')"

test_cases:

  # Basic: correlated scalar subquery returns correct value per row
  - name: "Correlated scalar subquery basic"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS lbl
      FROM sc_a
      ORDER BY sc_a.id
    expect:
      rows: 4
      data:
        - id: 1
          lbl: Alpha
        - id: 2
          lbl: Beta
        - id: 3
          lbl: Alpha
        - id: 4
          lbl: null

  # Second run of same query: tempcol is warm, results identical
  - name: "Correlated scalar subquery second run (warm cache)"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS lbl
      FROM sc_a
      ORDER BY sc_a.id
    expect:
      rows: 4
      data:
        - id: 1
          lbl: Alpha
        - id: 2
          lbl: Beta
        - id: 3
          lbl: Alpha
        - id: 4
          lbl: null

  # Two identical scalar subqueries in same SELECT: same tempcol, single inner scan
  - name: "Identical scalar subqueries share tempcol"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS c1,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS c2
      FROM sc_a
      ORDER BY sc_a.id
    expect:
      rows: 4
      data:
        - id: 1
          c1: Alpha
          c2: Alpha
        - id: 2
          c1: Beta
          c2: Beta
        - id: 3
          c1: Alpha
          c2: Alpha
        - id: 4
          c1: null
          c2: null

  # NULL outer correlation value: inner scan with NULL = no match → NULL result
  - name: "NULL outer y produces NULL"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS lbl
      FROM sc_a
      WHERE sc_a.id = 4
    expect:
      rows: 1
      data:
        - id: 4
          lbl: null

  # No match in inner table: returns NULL (not an error)
  - name: "No match in inner table returns NULL"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS lbl
      FROM sc_a
      WHERE sc_a.id = 4
    expect:
      rows: 1
      data:
        - id: 4
          lbl: null

  # Multiple rows in inner would error even with tempcol
  - name: "Multiple inner rows still errors"
    sql: |
      SELECT (SELECT id FROM sc_a WHERE sc_a.y = 10) AS v
    expect:
      error: true

  # Non-correlated scalar subquery: same value for all rows, tempcol on sc_a
  - name: "Non-correlated scalar subquery cached"
    sql: |
      SELECT sc_a.id,
        (SELECT COUNT(*) FROM sc_b) AS total
      FROM sc_a
      ORDER BY sc_a.id
    expect:
      rows: 4
      data:
        - id: 1
          total: 2
        - id: 2
          total: 2
        - id: 3
          total: 2
        - id: 4
          total: 2

  # Scalar subquery in WHERE clause
  - name: "Scalar subquery in WHERE"
    sql: |
      SELECT sc_a.id
      FROM sc_a
      WHERE (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) = 'Alpha'
      ORDER BY sc_a.id
    expect:
      rows: 2
      data:
        - id: 1
        - id: 3

  # After INSERT: new rows get their scalar result computed on demand
  - name: "New row inserted into sc_a gets correct scalar result"
    sql: |
      INSERT INTO sc_a (id, y) VALUES (5, 20)
    expect: {}

  - name: "New row scalar result correct after insert"
    sql: |
      SELECT sc_a.id,
        (SELECT x FROM sc_b WHERE sc_b.id = sc_a.y) AS lbl
      FROM sc_a
      WHERE sc_a.id = 5
    expect:
      rows: 1
      data:
        - id: 5
          lbl: Beta

cleanup:
  - sql: "DROP TABLE IF EXISTS sc_a"
  - sql: "DROP TABLE IF EXISTS sc_b"
