# KILL QUERY and LOCK TABLES functional tests

metadata:
  version: "1.0"
  description: "Tests for KILL QUERY (panic-based cancel) and LOCK TABLES session locks"

test_cases:

  # ── setup ──────────────────────────────────────────────────────────────────

  - name: "setup: create lock_test table"
    sql: "CREATE TABLE IF NOT EXISTS lock_test (id INT, val VARCHAR(50))"
    setup:
      - sql: "DROP TABLE IF EXISTS lock_test"
      - sql: "CREATE TABLE lock_test (id INT, val VARCHAR(50))"
      - sql: "INSERT INTO lock_test VALUES (1, 'alpha'), (2, 'beta')"

  # ── basic WRITE lock ───────────────────────────────────────────────────────

  - name: "WRITE lock and unlock (same session)"
    steps:
      - session_id: "lock-basic-w"
        sql: "LOCK TABLES lock_test WRITE"
      - session_id: "lock-basic-w"
        sql: "INSERT INTO lock_test VALUES (3, 'gamma')"
      - session_id: "lock-basic-w"
        sql: "UNLOCK TABLES"
      - session_id: "lock-basic-w"
        sql: "SELECT COUNT(*) AS n FROM lock_test"
        expect:
          rows: 1
          contains: "3"

  # ── basic READ lock ────────────────────────────────────────────────────────

  - name: "READ lock allows reads from same session"
    steps:
      - session_id: "lock-basic-r"
        sql: "LOCK TABLES lock_test READ"
      - session_id: "lock-basic-r"
        sql: "SELECT COUNT(*) AS n FROM lock_test"
        expect:
          rows: 1
      - session_id: "lock-basic-r"
        sql: "UNLOCK TABLES"

  # ── owner write under READ lock must fail ──────────────────────────────────

  - name: "owner cannot INSERT while holding READ lock"
    steps:
      - session_id: "lock-readwrite"
        sql: "LOCK TABLES lock_test READ"
      - session_id: "lock-readwrite"
        sql: "INSERT INTO lock_test VALUES (99, 'forbidden')"
        expect:
          error: true
      - session_id: "lock-readwrite"
        sql: "UNLOCK TABLES"

  - name: "owner cannot UPDATE while holding READ lock"
    steps:
      - session_id: "lock-readupdate"
        sql: "LOCK TABLES lock_test READ"
      - session_id: "lock-readupdate"
        sql: "UPDATE lock_test SET val = 'x' WHERE id = 1"
        expect:
          error: true
      - session_id: "lock-readupdate"
        sql: "UNLOCK TABLES"

  # ── implicit unlock on second LOCK TABLES ─────────────────────────────────

  - name: "second LOCK TABLES implicitly releases first lock"
    steps:
      - session_id: "lock-implicit"
        sql: "LOCK TABLES lock_test WRITE"
      - session_id: "lock-implicit"
        sql: "LOCK TABLES lock_test READ"
      # now held as READ: INSERT must fail
      - session_id: "lock-implicit"
        sql: "INSERT INTO lock_test VALUES (100, 'should-fail')"
        expect:
          error: true
      - session_id: "lock-implicit"
        sql: "UNLOCK TABLES"

  # ── concurrent: WRITE lock blocks SELECT from another session ─────────────

  - name: "WRITE lock blocks SELECT from another session until UNLOCK"
    steps:
      - session_id: "lock-conc-writer"
        sql: "LOCK TABLES lock_test WRITE"
      # other session's SELECT runs in background — blocks until UNLOCK
      - session_id: "lock-conc-reader"
        sql: "SELECT id FROM lock_test WHERE id = 1"
        background: true
        expect:
          rows: 1
          contains: "1"
      # brief no-op so background query reaches the lock wait before UNLOCK
      - session_id: "lock-conc-writer"
        sql: "SELECT 1"
      - session_id: "lock-conc-writer"
        sql: "UNLOCK TABLES"
      # background thread joins here: SELECT must have completed with correct data

  # ── concurrent: WRITE lock blocks INSERT from another session ─────────────

  - name: "WRITE lock blocks INSERT from another session until UNLOCK"
    steps:
      - session_id: "lock-conc-w2"
        sql: "DELETE FROM lock_test WHERE id = 50"
      - session_id: "lock-conc-w2"
        sql: "LOCK TABLES lock_test WRITE"
      - session_id: "lock-conc-ins"
        sql: "INSERT INTO lock_test VALUES (50, 'concurrent')"
        background: true
        # INSERT returns {"affected_rows":1} = 1 JSONL row on success
        expect:
          rows: 1
      - session_id: "lock-conc-w2"
        sql: "SELECT 1"
      - session_id: "lock-conc-w2"
        sql: "UNLOCK TABLES"
      # after join: verify the INSERT committed
      - session_id: "lock-conc-w2"
        sql: "SELECT val FROM lock_test WHERE id = 50"
        expect:
          rows: 1
          contains: "concurrent"

  # ── concurrent: READ lock blocks INSERT from another session ──────────────

  - name: "READ lock blocks INSERT from another session until UNLOCK"
    steps:
      - session_id: "lock-conc-r2"
        sql: "DELETE FROM lock_test WHERE id = 51"
      - session_id: "lock-conc-r2"
        sql: "LOCK TABLES lock_test READ"
      - session_id: "lock-conc-ins2"
        sql: "INSERT INTO lock_test VALUES (51, 'blocked-write')"
        background: true
        expect:
          rows: 1
      - session_id: "lock-conc-r2"
        sql: "SELECT 1"
      - session_id: "lock-conc-r2"
        sql: "UNLOCK TABLES"
      # after join: verify the INSERT committed
      - session_id: "lock-conc-r2"
        sql: "SELECT val FROM lock_test WHERE id = 51"
        expect:
          rows: 1
          contains: "blocked-write"

  # ── concurrent: READ lock allows parallel reads from other sessions ────────

  - name: "READ lock allows SELECT from another session without blocking"
    steps:
      - session_id: "lock-conc-r3"
        sql: "LOCK TABLES lock_test READ"
      # other session reads concurrently — must NOT block
      - session_id: "lock-conc-r3-other"
        sql: "SELECT COUNT(*) AS n FROM lock_test"
        background: true
        expect:
          rows: 1
      - session_id: "lock-conc-r3"
        sql: "UNLOCK TABLES"

  # ── data integrity after concurrent lock cycle ────────────────────────────

  - name: "data written under WRITE lock is visible after UNLOCK"
    steps:
      - session_id: "lock-integrity"
        sql: "DELETE FROM lock_test WHERE id >= 200"
      - session_id: "lock-integrity"
        sql: "LOCK TABLES lock_test WRITE"
      - session_id: "lock-integrity"
        sql: "INSERT INTO lock_test VALUES (200, 'locked-insert')"
      - session_id: "lock-integrity"
        sql: "UNLOCK TABLES"
      - session_id: "lock-integrity-reader"
        sql: "SELECT val FROM lock_test WHERE id = 200"
        expect:
          rows: 1
          contains: "locked-insert"

  # ── unknown table raises error ─────────────────────────────────────────────

  - name: "LOCK TABLE unknown table raises error"
    sql: "LOCK TABLES nonexistent_table_xyz WRITE"
    expect:
      error: true

  # ── SHOW PROCESSLIST still works ──────────────────────────────────────────

  - name: "SHOW PROCESSLIST after lock/unlock cycle"
    sql: "SHOW PROCESSLIST"

  # ── KILL QUERY ─────────────────────────────────────────────────────────────

  - name: "KILL QUERY with nonexistent id returns false gracefully"
    sql: "KILL QUERY 999999999"
    expect:
      rows: 0

  # ── cleanup ────────────────────────────────────────────────────────────────

  - name: "cleanup: drop lock_test table"
    sql: "DROP TABLE IF EXISTS lock_test"
