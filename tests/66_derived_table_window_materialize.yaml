# Correlated scalar subselect containing a derived table with window function.
# The inner derived table uses ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)
# and the outer WHERE filters by rn = 1. When used as a correlated scalar subselect,
# the derived table must be re-materialized per outer row OR the WHERE must correctly
# filter to a single row.

metadata:
  version: "1.0"
  description: "Scalar subselect with window function derived table"

setup:
  - sql: "DROP TABLE IF EXISTS dtwm_parent"
  - sql: "DROP TABLE IF EXISTS dtwm_hist"
  - sql: "CREATE TABLE dtwm_parent (ID INT PRIMARY KEY, name TEXT)"
  - sql: "CREATE TABLE dtwm_hist (ID INT PRIMARY KEY, parent INT, val INT, ts INT)"
  - sql: "INSERT INTO dtwm_parent VALUES (1, 'A'), (2, 'B')"
  - sql: "INSERT INTO dtwm_hist VALUES (1, 1, 100, 1000), (2, 1, 200, 2000), (3, 2, 300, 3000)"

test_cases:

  - name: "window function derived table standalone"
    sql: |
      SELECT sub.val FROM (
        SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
        FROM dtwm_hist
      ) sub WHERE sub.parent = 1 AND sub.rn = 1
    expect:
      rows: 1
      data:
        - val: 200

  - name: "correlated scalar subselect with window function derived table"
    sql: |
      SELECT p.ID, p.name,
        (SELECT sub.val FROM (
          SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
          FROM dtwm_hist
        ) sub WHERE sub.parent = p.ID AND sub.rn = 1) AS latest
      FROM dtwm_parent p
      ORDER BY p.ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "A"
          latest: 200
        - ID: 2
          name: "B"
          latest: 300

  - name: "COALESCE wrapped correlated scalar subselect with window function"
    sql: |
      SELECT p.ID,
        COALESCE((SELECT sub.val FROM (
          SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
          FROM dtwm_hist
        ) sub WHERE sub.parent = p.ID AND sub.rn = 1), 0) AS latest
      FROM dtwm_parent p
      ORDER BY p.ID
    expect:
      rows: 2
      data:
        - ID: 1
          latest: 200
        - ID: 2
          latest: 300

  - name: "LEFT JOIN with window function derived table"
    sql: |
      SELECT p.ID, p.name, h.val
      FROM dtwm_parent p
      LEFT JOIN (
        SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
        FROM dtwm_hist
      ) h ON h.parent = p.ID AND h.rn = 1
      ORDER BY p.ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "A"
          val: 200
        - ID: 2
          name: "B"
          val: 300

cleanup:
  - sql: "DROP TABLE IF EXISTS dtwm_parent"
  - sql: "DROP TABLE IF EXISTS dtwm_hist"
