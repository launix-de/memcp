# EXISTS subselect with AND condition containing a scalar subselect
# referencing a session variable. Pattern from ticket access check.

metadata:
  version: "1.0"
  description: "EXISTS subselect with session variable in correlated scalar subselect"

setup:
  - sql: "DROP TABLE IF EXISTS esv_items"
  - sql: "DROP TABLE IF EXISTS esv_access"
  - sql: "DROP TABLE IF EXISTS esv_users"
  - sql: "CREATE TABLE esv_users (ID INT PRIMARY KEY, name TEXT)"
  - sql: "CREATE TABLE esv_items (ID INT PRIMARY KEY, title TEXT)"
  - sql: "CREATE TABLE esv_access (ID INT PRIMARY KEY AUTO_INCREMENT, item_id INT, user_id INT)"
  - sql: "INSERT INTO esv_users VALUES (1, 'Alice'), (2, 'Bob')"
  - sql: "INSERT INTO esv_items VALUES (1, 'Item A'), (2, 'Item B')"
  - sql: "INSERT INTO esv_access VALUES (1, 1, 1), (2, 2, 2)"

test_cases:

  - name: "scalar subselect with session var in WHERE (baseline)"
    session_id: "sess_esv"
    sql: "SET @current_user = 1"
  - name: "scalar subselect returns correct boolean"
    session_id: "sess_esv"
    sql: |
      SELECT a.item_id,
        (SELECT u.ID = @current_user FROM esv_users u WHERE u.ID = a.user_id LIMIT 1) AS is_mine
      FROM esv_access a ORDER BY a.item_id
    expect:
      rows: 2
      data:
        - item_id: 1
          is_mine: 1
        - item_id: 2
          is_mine: 0

  - name: "WHERE with scalar subselect session var"
    session_id: "sess_esv"
    sql: |
      SELECT a.item_id FROM esv_access a
      WHERE (SELECT u.ID = @current_user FROM esv_users u WHERE u.ID = a.user_id LIMIT 1)
      ORDER BY a.item_id
    expect:
      rows: 1
      data:
        - item_id: 1

  - name: "EXISTS with AND scalar subselect session var"
    session_id: "sess_esv"
    sql: |
      SELECT i.ID, i.title,
        EXISTS (
          SELECT TRUE FROM esv_access a
          WHERE a.item_id = i.ID
          AND (SELECT u.ID = @current_user FROM esv_users u WHERE u.ID = a.user_id LIMIT 1)
          LIMIT 1
        ) AS has_access
      FROM esv_items i ORDER BY i.ID
    expect:
      rows: 2
      data:
        - ID: 1
          title: "Item A"
          has_access: 1
        - ID: 2
          title: "Item B"
          has_access: 0

  - name: "WHERE EXISTS with session var (full access check pattern)"
    session_id: "sess_esv"
    sql: |
      SELECT i.ID, i.title FROM esv_items i
      WHERE EXISTS (
        SELECT TRUE FROM esv_access a
        WHERE a.item_id = i.ID
        AND (SELECT u.ID = @current_user FROM esv_users u WHERE u.ID = a.user_id LIMIT 1)
        LIMIT 1
      )
    expect:
      rows: 1
      data:
        - ID: 1
          title: "Item A"

cleanup:
  - sql: "DROP TABLE IF EXISTS esv_access"
  - sql: "DROP TABLE IF EXISTS esv_items"
  - sql: "DROP TABLE IF EXISTS esv_users"
