# UPDATE with EXISTS subselect on the same table.
# MySQL handles this via MVCC. MemCP deadlocks because the UPDATE's
# exclusive shard lock blocks the nested EXISTS read scan.

metadata:
  version: "1.0"
  description: "UPDATE with self-referencing EXISTS subselect"

setup:
  - sql: "DROP TABLE IF EXISTS use_state"
  - sql: |
      CREATE TABLE use_state (
        ID INT PRIMARY KEY,
        name TEXT,
        next_state INT
      )
  - sql: "INSERT INTO use_state VALUES (1, 'open', NULL), (2, 'progress', 1), (3, 'done', NULL)"

test_cases:

  - name: "SELECT with self-join EXISTS (baseline)"
    sql: |
      SELECT s1.ID, s1.name,
        EXISTS (SELECT 1 FROM use_state s2 WHERE s2.next_state = s1.ID) AS is_target
      FROM use_state s1
      ORDER BY s1.ID
    expect:
      rows: 3
      data:
        - ID: 1
          name: "open"
          is_target: 1
        - ID: 2
          name: "progress"
          is_target: 0
        - ID: 3
          name: "done"
          is_target: 0

  - name: "UPDATE with self-referencing EXISTS in CASE"
    sql: |
      UPDATE use_state s1 SET name = CASE
        WHEN next_state IS NOT NULL THEN 'has_next'
        WHEN EXISTS (SELECT 1 FROM use_state s2 WHERE s2.next_state = s1.ID) THEN 'is_target'
        ELSE 'leaf'
      END

  - name: "verify self-referencing UPDATE"
    sql: "SELECT ID, name FROM use_state ORDER BY ID"
    expect:
      rows: 3
      data:
        - ID: 1
          name: "is_target"
        - ID: 2
          name: "has_next"
        - ID: 3
          name: "leaf"

cleanup:
  - sql: "DROP TABLE IF EXISTS use_state"
