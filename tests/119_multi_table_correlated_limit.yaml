#
# Finding 3 (FAQ §43): a correlated scalar subselect whose inner FROM
# joins TWO tables and carries ORDER BY ... LIMIT k (OFFSET o) per outer
# binding must lower to a window rewrite:
#   SELECT * FROM (SELECT *, ROW_NUMBER() OVER (PARTITION BY <outer-refs>
#                                                ORDER BY x) rn
#                  FROM <multi-table inner>) WHERE rn BETWEEN o+1 AND k+o
# instead of returning nil at queryplan-tree-ir.scm:707 ("not yet supported").
#
# Currently RED — gate test for Phase D / #35. Goes green when the
# ROW_NUMBER lowering lands.

metadata:
  version: "1.0"
  description: "Multi-table correlated scalar subselect with ORDER BY LIMIT (FAQ §43)"

setup:
  - sql: "DROP TABLE IF EXISTS mtl_main"
  - sql: "DROP TABLE IF EXISTS mtl_hist"
  - sql: "DROP TABLE IF EXISTS mtl_kind"
  - sql: "CREATE TABLE mtl_main (ID INT PRIMARY KEY, name TEXT)"
  - sql: "CREATE TABLE mtl_hist (ID INT PRIMARY KEY, parent INT, kind_id INT, val INT, ts INT)"
  - sql: "CREATE TABLE mtl_kind (ID INT PRIMARY KEY, label TEXT)"
  - sql: "INSERT INTO mtl_main VALUES (1, 'Alice'), (2, 'Bob')"
  - sql: |
      INSERT INTO mtl_hist VALUES
        (1, 1, 100, 50,  1000),
        (2, 1, 200, 70,  2000),
        (3, 2, 100, 30,  1500),
        (4, 2, 200, 90,  2500)
  - sql: "INSERT INTO mtl_kind VALUES (100, 'red'), (200, 'blue')"

cleanup:
  - sql: "DROP TABLE IF EXISTS mtl_main"
  - sql: "DROP TABLE IF EXISTS mtl_hist"
  - sql: "DROP TABLE IF EXISTS mtl_kind"

test_cases:
  # Two inner tables (mtl_hist h JOIN mtl_kind k) per outer mtl_main row,
  # ORDER BY h.ts DESC LIMIT 1 — must yield the most-recent kind label per
  # outer row. ROW_NUMBER OVER (PARTITION BY h.parent ORDER BY h.ts DESC)
  # rewrite produces row 1, 2 for each parent; WHERE rn = 1 picks the latest.
  - name: "multi-table inner with ORDER BY LIMIT 1 per outer row"
    sql: |
      SELECT m.ID, m.name,
        (SELECT k.label FROM mtl_hist h JOIN mtl_kind k ON k.ID = h.kind_id
         WHERE h.parent = m.ID ORDER BY h.ts DESC LIMIT 1) AS latest_kind
      FROM mtl_main m
      ORDER BY m.ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "Alice"
          latest_kind: "blue"
        - ID: 2
          name: "Bob"
          latest_kind: "blue"

  # Same shape with LIMIT k > 1 + OFFSET o > 0 — exercises the BETWEEN o+1..k+o
  # part of the FAQ §43 rewrite. Returns the 2nd-most-recent value per outer.
  - name: "multi-table inner with ORDER BY LIMIT 1 OFFSET 1"
    sql: |
      SELECT m.ID,
        (SELECT h.val FROM mtl_hist h JOIN mtl_kind k ON k.ID = h.kind_id
         WHERE h.parent = m.ID ORDER BY h.ts DESC LIMIT 1 OFFSET 1) AS prev_val
      FROM mtl_main m
      ORDER BY m.ID
    expect:
      rows: 2
      data:
        - ID: 1
          prev_val: 50
        - ID: 2
          prev_val: 30
