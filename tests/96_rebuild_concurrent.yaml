# Stress test: concurrent writes, reads, and REBUILD must not lose data.
# This exercises the non-repartition rebuild path under parallel readers and
# writers, complementing 71_repartition_concurrent.yaml which covers the
# partitioned dual-write path.

metadata:
  version: "1.0"
  description: "Concurrent write + rebuild data integrity"

setup:
  - sql: "DROP TABLE IF EXISTS rc_data"
  - sql: "CREATE TABLE rc_data (id INT PRIMARY KEY, val TEXT)"
  - scm: |
      (begin
        (set rows (map (produceN 20000) (lambda (i)
          (list (+ i 1) (concat "v" (+ i 1)))))
        )
        (insert (table "memcp-tests" "rc_data") '("id" "val") rows)
        20000)

test_cases:

  - name: "baseline count before rebuild"
    sql: "SELECT COUNT(*) AS c FROM rc_data"
    expect:
      rows: 1
      data:
        - c: 20000

  - name: "rebuild under live traffic"
    parallel: live_rebuild
    scm: "(rebuild)"

  - name: "INSERT during rebuild"
    parallel: live_rebuild
    sql: "INSERT INTO rc_data VALUES (20001, 'new-1'), (20002, 'new-2'), (20003, 'new-3')"
    expect:
      affected_rows: 3

  - name: "UPDATE during rebuild"
    parallel: live_rebuild
    sql: "UPDATE rc_data SET val = 'updated-1' WHERE id = 1"
    expect:
      affected_rows: 1

  - name: "DELETE during rebuild"
    parallel: live_rebuild
    sql: "DELETE FROM rc_data WHERE id = 20000"
    expect:
      affected_rows: 1

  - name: "Stable prefix COUNT during rebuild"
    parallel: live_rebuild
    sql: "SELECT COUNT(*) AS c FROM rc_data WHERE id >= 2 AND id <= 100"
    expect:
      rows: 1
      data:
        - c: 99

  - name: "Stable point lookup during rebuild"
    parallel: live_rebuild
    sql: "SELECT id, val FROM rc_data WHERE id = 42"
    expect:
      rows: 1
      data:
        - id: 42
          val: "v42"

  - name: "Stable ordered read during rebuild"
    parallel: live_rebuild
    sql: "SELECT id FROM rc_data WHERE id >= 100 AND id < 103 ORDER BY id"
    expect:
      rows: 3
      data:
        - id: 100
        - id: 101
        - id: 102

  - name: "count after inserts"
    sql: "SELECT COUNT(*) AS c FROM rc_data"
    expect:
      rows: 1
      data:
        - c: 20002

  - name: "verify UPDATE persisted"
    sql: "SELECT val FROM rc_data WHERE id = 1"
    expect:
      rows: 1
      data:
        - val: "updated-1"

  - name: "count after DELETE"
    sql: "SELECT COUNT(*) AS c FROM rc_data"
    expect:
      rows: 1
      data:
        - c: 20002

  - name: "verify inserted rows after rebuild"
    sql: "SELECT id, val FROM rc_data WHERE id >= 20001 ORDER BY id"
    expect:
      rows: 3
      data:
        - id: 20001
          val: "new-1"
        - id: 20002
          val: "new-2"
        - id: 20003
          val: "new-3"

  - name: "verify deleted row stayed deleted"
    sql: "SELECT COUNT(*) AS c FROM rc_data WHERE id = 20000"
    expect:
      rows: 1
      data:
        - c: 0

  - name: "second rebuild after concurrent pass"
    scm: "(rebuild)"

  - name: "final count after second rebuild"
    sql: "SELECT COUNT(*) AS c FROM rc_data"
    expect:
      rows: 1
      data:
        - c: 20002

  - name: "verify stable prefix after second rebuild"
    sql: "SELECT COUNT(*) AS c FROM rc_data WHERE id >= 2 AND id <= 100"
    expect:
      rows: 1
      data:
        - c: 99

cleanup:
  - sql: "DROP TABLE IF EXISTS rc_data"
