metadata:
  version: "1.0"
  description: "Minimal grouped aggregate + window over grouped rows repro"
  isolated: true

test_cases:
  - name: "Create grouped window test table"
    sql: "CREATE TABLE wg_reject (id INT PRIMARY KEY, parent INT, amount INT)"

  - name: "Insert grouped window test data"
    sql: |
      INSERT INTO wg_reject VALUES
      (1, 100, 500),
      (2, 100, 300),
      (3, 100, 700),
      (4, 200, 200),
      (5, 200, 400)

  - name: "Window over grouped aggregate uses grouped rows"
    sql: "SELECT parent, SUM(amount), LEAD(SUM(amount)) OVER (ORDER BY parent) FROM wg_reject GROUP BY parent"
    expect:
      rows: 2
      data:
        - parent: 100
          SUM(amount): 1500
          LEAD(SUM(amount)) OVER (ORDER BY parent): 600
        - parent: 200
          SUM(amount): 600
          LEAD(SUM(amount)) OVER (ORDER BY parent): null

  - name: "Drop grouped window test table"
    sql: "DROP TABLE IF EXISTS wg_reject"
