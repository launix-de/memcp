# UPDATE with EXISTS subselect on the same table.
# MySQL handles this via MVCC (snapshot isolation).
# Pattern: UPDATE t1 SET col = ... WHERE EXISTS (SELECT * FROM t1 t2 WHERE t2.col = t1.ID)

metadata:
  version: "1.0"
  description: "UPDATE with self-referencing EXISTS subselect"

setup:
  - sql: "DROP TABLE IF EXISTS uss_state"
  - sql: |
      CREATE TABLE uss_state (
        ID INT PRIMARY KEY,
        name TEXT,
        aftercontact INT
      )
  - sql: "INSERT INTO uss_state VALUES (1, 'New', NULL), (2, 'Called', 1), (3, 'Done', NULL)"

test_cases:

  - name: "SELECT with self-join EXISTS (baseline)"
    sql: |
      SELECT s1.ID, s1.name,
        EXISTS (SELECT * FROM uss_state s2 WHERE s2.aftercontact = s1.ID) AS is_referenced
      FROM uss_state s1
      ORDER BY s1.ID
    expect:
      rows: 3
      data:
        - ID: 1
          name: "New"
          is_referenced: 1
        - ID: 2
          name: "Called"
          is_referenced: 0
        - ID: 3
          name: "Done"
          is_referenced: 0

  - name: "UPDATE with self-referencing EXISTS in CASE"
    sql: |
      UPDATE uss_state s1 SET name = CASE
        WHEN aftercontact IS NOT NULL THEN 'has_after'
        WHEN EXISTS (SELECT * FROM uss_state s2 WHERE s2.aftercontact = s1.ID) THEN 'is_after'
        ELSE 'none'
      END

  - name: "verify self-referencing UPDATE"
    sql: "SELECT ID, name FROM uss_state ORDER BY ID"
    expect:
      rows: 3
      data:
        - ID: 1
          name: "is_after"
        - ID: 2
          name: "has_after"
        - ID: 3
          name: "none"

cleanup:
  - sql: "DROP TABLE IF EXISTS uss_state"
