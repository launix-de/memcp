# Complex subquery coverage
# Targets scan.go subquery evaluation, compute.go expression paths,
# and scan_helper.go various scan strategies.

metadata:
  version: "1.0"
  description: "Subqueries: scalar, IN, EXISTS, correlated, in HAVING and WHERE"

setup:
  - sql: "DROP TABLE IF EXISTS sq_dept"
  - sql: "DROP TABLE IF EXISTS sq_emp"
  - sql: |
      CREATE TABLE sq_dept (did INT, dname VARCHAR(30))
  - sql: |
      INSERT INTO sq_dept VALUES
        (1, 'Engineering'), (2, 'Marketing'), (3, 'Sales'), (4, 'Empty')
  - sql: |
      CREATE TABLE sq_emp (eid INT, name VARCHAR(30), did INT, salary DOUBLE)
  - sql: |
      INSERT INTO sq_emp VALUES
        (1, 'Alice', 1, 90000),
        (2, 'Bob', 1, 80000),
        (3, 'Carol', 2, 70000),
        (4, 'Dave', 2, 75000),
        (5, 'Eve', 3, 60000),
        (6, 'Frank', 1, 95000),
        (7, 'Grace', 3, 65000),
        (8, 'Henry', NULL, 50000)

test_cases:

  # === Scalar subquery in SELECT ===

  - name: "Scalar subquery: total count"
    sql: "SELECT name, (SELECT COUNT(*) FROM sq_emp) AS total FROM sq_emp WHERE eid = 1"
    expect:
      rows: 1
      data:
        - name: "Alice"
          total: 8

  - name: "Scalar subquery: department name"
    sql: |
      SELECT e.name, (SELECT d.dname FROM sq_dept d WHERE d.did = e.did) AS dept
      FROM sq_emp e WHERE e.eid = 1
    expect:
      rows: 1
      data:
        - name: "Alice"
          dept: "Engineering"

  # === IN subquery ===

  - name: "IN with subquery"
    sql: |
      SELECT name FROM sq_emp
      WHERE did IN (SELECT did FROM sq_dept WHERE dname = 'Engineering')
      ORDER BY name
    expect:
      rows: 3
      data:
        - name: "Alice"
        - name: "Bob"
        - name: "Frank"

  - name: "NOT IN with subquery"
    sql: |
      SELECT name FROM sq_emp
      WHERE did NOT IN (SELECT did FROM sq_dept WHERE dname = 'Engineering')
      AND did IS NOT NULL
      ORDER BY name
    expect:
      rows: 4

  # === EXISTS subquery ===

  - name: "EXISTS: departments with employees"
    sql: |
      SELECT dname FROM sq_dept d
      WHERE EXISTS (SELECT 1 FROM sq_emp e WHERE e.did = d.did)
      ORDER BY dname
    expect:
      rows: 3

  - name: "NOT EXISTS: departments without employees"
    sql: |
      SELECT dname FROM sq_dept d
      WHERE NOT EXISTS (SELECT 1 FROM sq_emp e WHERE e.did = d.did)
    expect:
      rows: 1
      data:
        - dname: "Empty"

  # === Subquery in WHERE with comparison ===

  - name: "Subquery comparison: salary above average"
    sql: |
      SELECT e.name, e.salary
      FROM sq_emp e
      WHERE e.salary > (SELECT AVG(salary) FROM sq_emp)
      ORDER BY e.salary DESC
    expect:
      rows: 4

  - name: "Subquery: MAX from subquery"
    sql: |
      SELECT name FROM sq_emp
      WHERE salary = (SELECT MAX(salary) FROM sq_emp)
    expect:
      rows: 1
      data:
        - name: "Frank"

  # === Subquery in HAVING ===

  - name: "HAVING with scalar subquery"
    sql: |
      SELECT did, AVG(salary) AS avg_sal
      FROM sq_emp
      WHERE did IS NOT NULL
      GROUP BY did
      HAVING AVG(salary) > (SELECT AVG(salary) FROM sq_emp)
    expect:
      rows: 1

  # === Nested subqueries ===

  - name: "Nested IN subquery"
    sql: |
      SELECT name FROM sq_emp
      WHERE did IN (
        SELECT did FROM sq_dept
        WHERE dname IN ('Engineering', 'Sales')
      )
      ORDER BY name
    expect:
      rows: 5

  # === Subquery returning empty result ===

  - name: "IN empty subquery"
    sql: |
      SELECT name FROM sq_emp
      WHERE did IN (SELECT did FROM sq_dept WHERE dname = 'Nonexistent')
    expect:
      rows: 0

  - name: "EXISTS on empty subquery"
    sql: |
      SELECT dname FROM sq_dept d
      WHERE EXISTS (SELECT 1 FROM sq_emp e WHERE e.did = d.did AND e.salary > 999999)
    expect:
      rows: 0

  # === nD domain: correlated on one column + inner filter ===

  - name: "1D domain with inner filter"
    sql: |
      SELECT e.name,
        (SELECT d.dname FROM sq_dept d WHERE d.did = e.did AND d.did > 0) AS dept
      FROM sq_emp e WHERE e.eid <= 3
      ORDER BY e.eid
    expect:
      rows: 3
      data:
        - name: "Alice"
          dept: "Engineering"
        - name: "Bob"
          dept: "Engineering"
        - name: "Carol"
          dept: "Marketing"

  # === Multi-table unnested subquery ===

  - name: "Multi-table scalar subselect unnested"
    sql: |
      SELECT e.name,
        (SELECT d.dname FROM sq_dept d JOIN sq_dept d2 ON d.did = d2.did WHERE d.did = e.did) AS dept
      FROM sq_emp e WHERE e.eid = 1
    expect:
      rows: 1
      data:
        - name: "Alice"
          dept: "Engineering"

  # === Nested subselect: inner subselect unnested, then outer level ===

  - name: "Nested correlated subselect - inner unnested, outer inline"
    sql: |
      SELECT e.name,
        (SELECT d.dname FROM sq_dept d
         WHERE d.did = (SELECT t.did FROM sq_emp t WHERE t.eid = e.eid) LIMIT 1) AS dept
      FROM sq_emp e WHERE e.eid = 1
    expect:
      rows: 1
      data:
        - name: "Alice"
          dept: "Engineering"

  # === nD domain: multiple outer references ===

  - name: "2D domain: two correlated equality conditions"
    sql: |
      SELECT e.eid, e.did,
        (SELECT d.dname FROM sq_dept d WHERE d.did = e.did AND d.did = e.eid) AS self_dept
      FROM sq_emp e WHERE e.eid <= 4
      ORDER BY e.eid
    expect:
      rows: 4
      data:
        - eid: 1
          did: 1
          self_dept: "Engineering"
        - eid: 2
          did: 1
          self_dept: null
        - eid: 3
          did: 2
          self_dept: null
        - eid: 4
          did: 2
          self_dept: null

  # === GROUP BY extension (Neumann Γ_{A∪D}) ===

  - name: "Aggregate COUNT correlated subselect (1D domain)"
    sql: |
      SELECT d.dname,
        (SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did) AS emp_count
      FROM sq_dept d WHERE d.did <= 3
      ORDER BY d.did
    expect:
      rows: 3
      data:
        - dname: "Engineering"
          emp_count: 3
        - dname: "Marketing"
          emp_count: 2
        - dname: "Sales"
          emp_count: 2

  - name: "Aggregate SUM correlated subselect"
    sql: |
      SELECT d.dname,
        (SELECT SUM(e.salary) FROM sq_emp e WHERE e.did = d.did) AS total_sal
      FROM sq_dept d WHERE d.did = 1
    expect:
      rows: 1
      data:
        - dname: "Engineering"
          total_sal: 265000

  - name: "Aggregate correlated subselect with no match returns 0"
    sql: |
      SELECT d.dname,
        (SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did) AS emp_count
      FROM sq_dept d WHERE d.did = 4
    expect:
      rows: 1
      data:
        - dname: "Empty"
          emp_count: 0

  - name: "Aggregate correlated subselect in WHERE comparison"
    sql: |
      SELECT d.dname
      FROM sq_dept d
      WHERE (SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did) >= 3
    expect:
      rows: 1
      data:
        - dname: "Engineering"

  - name: "2D domain with aggregate"
    sql: |
      SELECT e.eid,
        (SELECT COUNT(1) FROM sq_dept d WHERE d.did = e.did AND d.did = e.eid) AS matching
      FROM sq_emp e WHERE e.eid <= 4
      ORDER BY e.eid
    expect:
      rows: 4
      data:
        - eid: 1
          matching: 1
        - eid: 2
          matching: 0
        - eid: 3
          matching: 0
        - eid: 4
          matching: 0

  - name: "Nested subselect: inner unnested, outer is aggregate"
    sql: |
      SELECT d.dname,
        (SELECT COUNT(1) FROM sq_emp e
         WHERE e.did = d.did
         AND e.salary > (SELECT AVG(salary) FROM sq_emp) LIMIT 1) AS above_avg
      FROM sq_dept d WHERE d.did <= 2
      ORDER BY d.did
    expect:
      rows: 2
      data:
        - dname: "Engineering"
          above_avg: 3
        - dname: "Marketing"
          above_avg: 1

  # === Doubly-nested: innermost references outermost ===

  - name: "Doubly-nested scalar: inner references outermost table"
    sql: |
      SELECT e.name,
        (SELECT d.dname FROM sq_dept d
         WHERE d.did = (SELECT t.did FROM sq_emp t WHERE t.eid = e.eid LIMIT 1) LIMIT 1) AS dept
      FROM sq_emp e WHERE e.eid <= 3
      ORDER BY e.eid
    expect:
      rows: 3
      data:
        - name: "Alice"
          dept: "Engineering"
        - name: "Bob"
          dept: "Engineering"
        - name: "Carol"
          dept: "Marketing"

  # === 1-row constraint: LIMIT 1 on non-unique keys ===

  - name: "LIMIT 1 correlated subselect on non-unique key"
    sql: |
      SELECT d.dname,
        (SELECT e.name FROM sq_emp e WHERE e.did = d.did ORDER BY e.salary DESC LIMIT 1) AS top_earner
      FROM sq_dept d WHERE d.did <= 3
      ORDER BY d.did
    expect:
      rows: 3
      data:
        - dname: "Engineering"
          top_earner: "Frank"
        - dname: "Marketing"
          top_earner: "Dave"
        - dname: "Sales"
          top_earner: "Grace"

  - name: "LIMIT 1 correlated subselect without ORDER BY"
    sql: |
      SELECT d.dname,
        (SELECT e.name FROM sq_emp e WHERE e.did = d.did LIMIT 1) AS any_emp
      FROM sq_dept d WHERE d.did = 4
    expect:
      rows: 1
      data:
        - dname: "Empty"
          any_emp: null

  - name: "Correlated subselect without LIMIT returns one row (implicit LIMIT 1)"
    sql: |
      SELECT d.dname,
        (SELECT e.name FROM sq_emp e WHERE e.did = d.did) AS emp
      FROM sq_dept d WHERE d.did = 1
    expect:
      rows: 1

  - name: "COUNT correlated subselect with LIMIT 1 (redundant LIMIT)"
    sql: |
      SELECT d.dname,
        (SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did LIMIT 1) AS cnt
      FROM sq_dept d WHERE d.did <= 2
      ORDER BY d.did
    expect:
      rows: 2
      data:
        - dname: "Engineering"
          cnt: 3
        - dname: "Marketing"
          cnt: 2

  # === 1-row constraint: COUNT NULL vs 0 ===

  - name: "COUNT correlated returns 0 not NULL for empty match"
    sql: |
      SELECT d.dname,
        COALESCE((SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did), 0) AS cnt
      FROM sq_dept d WHERE d.did = 4
    expect:
      rows: 1
      data:
        - dname: "Empty"
          cnt: 0

  # === 1-row constraint: OFFSET ===

  - name: "Correlated subselect with OFFSET skips first match"
    sql: |
      SELECT d.dname,
        (SELECT e.name FROM sq_emp e WHERE e.did = d.did ORDER BY e.salary DESC LIMIT 1 OFFSET 1) AS second_earner
      FROM sq_dept d WHERE d.did = 1
    expect:
      rows: 1
      data:
        - dname: "Engineering"
          second_earner: "Alice"

  # === Aggregate in WHERE with correct 0-semantics ===

  - name: "Aggregate in WHERE with zero check"
    sql: |
      SELECT d.dname
      FROM sq_dept d
      WHERE (SELECT COUNT(1) FROM sq_emp e WHERE e.did = d.did) = 0
    expect:
      rows: 1
      data:
        - dname: "Empty"

cleanup:
  - sql: "DROP TABLE IF EXISTS sq_emp"
  - sql: "DROP TABLE IF EXISTS sq_dept"
