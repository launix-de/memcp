# Trigger with INSERT SELECT containing correlated subselect
# The subselect's unqualified columns must resolve against its own FROM,
# not against the trigger's target table.

metadata:
  version: "1.0"
  description: "Trigger INSERT SELECT with correlated subselect column scope"

setup:
  - sql: "DROP TABLE IF EXISTS tss_log"
  - sql: "DROP TABLE IF EXISTS tss_detail"
  - sql: "DROP TABLE IF EXISTS tss_main"
  - sql: |
      CREATE TABLE tss_main (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        name TEXT,
        date2 BIGINT
      )
  - sql: |
      CREATE TABLE tss_detail (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        main_id INT,
        label TEXT
      )
  - sql: |
      CREATE TABLE tss_log (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        detail_id INT,
        resolved_name TEXT
      )
  - sql: "INSERT INTO tss_detail VALUES (1, 1, 'alpha'), (2, 1, 'beta'), (3, 2, 'gamma')"
  - sql: |
      CREATE TRIGGER `tss_main.ia` AFTER INSERT ON `tss_main` FOR EACH ROW BEGIN
        INSERT IGNORE INTO tss_log(detail_id, resolved_name)
          SELECT d.ID,
            (SELECT m.name FROM tss_main m WHERE m.ID = d.main_id AND m.date2 IS NOT NULL LIMIT 1)
          FROM tss_detail d
          WHERE d.main_id = NEW.ID;
      END

test_cases:

  - name: "INSERT into main triggers INSERT SELECT with correlated subselect"
    sql: "INSERT INTO tss_main VALUES (1, 'hello', 1000)"

  - name: "verify trigger populated log"
    sql: "SELECT detail_id, resolved_name FROM tss_log ORDER BY detail_id"
    expect:
      rows: 2
      data:
        - detail_id: 1
          resolved_name: "hello"
        - detail_id: 2
          resolved_name: "hello"

  # Real pattern: INSERT into table WITHOUT date2, subselect FROM table WITH date2
  # The unqualified date2 in the subselect must resolve against the subselect's
  # FROM table, not against the INSERT target (which lacks date2).
  - name: "drop first trigger"
    sql: "DROP TRIGGER IF EXISTS `tss_main.ia`"
  - sql: "DELETE FROM tss_log"
  - name: "create trigger where INSERT target lacks the subselect column"
    sql: |
      CREATE TRIGGER `tss_main.ia2` AFTER INSERT ON `tss_main` FOR EACH ROW BEGIN
        INSERT IGNORE INTO tss_log(detail_id, resolved_name)
          SELECT d.ID,
            (SELECT m.name FROM tss_main m WHERE m.ID = d.main_id
              AND CASE WHEN `date2` IS NULL THEN TRUE ELSE `date2` >= 500 END
              LIMIT 1)
          FROM tss_detail d
          WHERE d.main_id = NEW.ID;
      END
  - name: "INSERT triggers subselect with column absent from INSERT target"
    sql: "INSERT INTO tss_main VALUES (2, 'world', 999)"
  - name: "verify subselect resolved column from its own FROM table"
    sql: "SELECT detail_id, resolved_name FROM tss_log WHERE detail_id = 3"
    expect:
      rows: 1
      data:
        - detail_id: 3
          resolved_name: "world"

  # Pattern from campaign.ia: INSERT SELECT with subselect WHERE unqualified
  # column belongs to subselect's FROM table, not the INSERT target.
  # The INSERT target (tss_log) does NOT have date2.
  - name: "drop triggers for cross-table test"
    sql: "DROP TRIGGER IF EXISTS `tss_main.ia`"
  - sql: "DROP TRIGGER IF EXISTS `tss_main.ia2`"
  - sql: "DROP TABLE IF EXISTS tss_assoc"
  - sql: "CREATE TABLE tss_assoc (ID INT PRIMARY KEY AUTO_INCREMENT, main_id INT, target INT)"
  - sql: "INSERT INTO tss_assoc VALUES (1, NULL, 10), (2, NULL, 20)"
  - sql: "DELETE FROM tss_log"
  - name: "trigger with INSERT SELECT + subselect referencing column absent from INSERT target"
    sql: |
      CREATE TRIGGER `tss_main.ia3` AFTER INSERT ON `tss_main` FOR EACH ROW BEGIN
        INSERT IGNORE INTO tss_log(detail_id, resolved_name)
          SELECT a.ID,
            (SELECT m.name FROM tss_main m WHERE m.ID = a.main_id
              AND CASE WHEN `date2` IS NULL THEN TRUE ELSE `date2` >= 500 END
              LIMIT 1)
          FROM tss_assoc a
          WHERE a.main_id IS NOT NULL AND NEW.ID = a.main_id;
      END
  - name: "setup assoc for trigger"
    sql: "UPDATE tss_assoc SET main_id = 3 WHERE ID = 1"
  - name: "INSERT triggers cross-table subselect with unqualified column"
    sql: "INSERT INTO tss_main VALUES (3, 'cross', 777)"
  - name: "verify cross-table subselect resolved correctly"
    sql: "SELECT detail_id, resolved_name FROM tss_log WHERE detail_id = 1"
    expect:
      rows: 1
      data:
        - detail_id: 1
          resolved_name: "cross"

  # Pattern from campaign.ia: trigger INSERT SELECT with correlated subselect
  # referencing a column from the INSERT SELECT's FROM clause (ASSOCIATED)
  # and unqualified columns from the subselect's own FROM (campaign.date2)
  - sql: "DROP TRIGGER IF EXISTS `tss_main.ia2`"
  - sql: "DROP TRIGGER IF EXISTS `tss_main.ia3`"
  - sql: "DROP TABLE IF EXISTS tss_target"
  - sql: "CREATE TABLE tss_target (ID INT PRIMARY KEY AUTO_INCREMENT, main_id INT, target INT)"
  - sql: "INSERT INTO tss_target VALUES (1, 10, 10), (2, 10, 20)"
  - sql: "DELETE FROM tss_log"
  - name: "trigger with INSERT SELECT + correlated subselect + ASSOCIATED ref"
    sql: |
      CREATE TRIGGER `tss_main.ia4` AFTER INSERT ON `tss_main` FOR EACH ROW BEGIN
        INSERT IGNORE INTO tss_log(detail_id, resolved_name)
          SELECT a.ID,
            (SELECT m.name FROM tss_main m WHERE m.ID = a.main_id
              AND CASE WHEN `date2` IS NULL THEN TRUE ELSE `date2` >= 500 END
              LIMIT 1)
          FROM tss_target a
          WHERE NOT ((a.target) IS NULL) AND (NEW.ID = a.main_id);
      END
  - name: "INSERT triggers INSERT SELECT with ASSOCIATED-like pattern"
    sql: "INSERT INTO tss_main VALUES (10, 'campaign', 999)"
  - name: "verify ASSOCIATED-pattern trigger"
    sql: "SELECT detail_id, resolved_name FROM tss_log ORDER BY detail_id"
    expect:
      rows: 2
      data:
        - detail_id: 1
          resolved_name: "campaign"
        - detail_id: 2
          resolved_name: "campaign"

  # Trigger cascade: INSERT into A → trigger inserts into B → trigger on B
  # references column from A via subselect. Column 'date2' exists in A but
  # not in B — the subselect must resolve date2 against A, not B.
  - sql: "DROP TRIGGER IF EXISTS `tss_main.ia4`"
  - sql: "DROP TABLE IF EXISTS tss_cascade_b"
  - sql: "CREATE TABLE tss_cascade_b (ID INT PRIMARY KEY AUTO_INCREMENT, ref_id INT, info TEXT)"
  - sql: |
      CREATE TRIGGER `tss_main.ia5` AFTER INSERT ON `tss_main` FOR EACH ROW BEGIN
        INSERT INTO tss_cascade_b(ref_id, info)
          SELECT a.ID,
            (SELECT m.name FROM tss_main m WHERE m.ID = a.main_id
              AND CASE WHEN `date2` IS NULL THEN TRUE ELSE `date2` >= 500 END
              LIMIT 1)
          FROM tss_target a
          WHERE NEW.ID = a.main_id;
      END
  - name: "trigger cascade with subselect referencing source table column"
    sql: "INSERT INTO tss_main VALUES (11, 'cascade', 800)"
  - name: "verify cascade trigger resolved date2 from source table"
    sql: "SELECT ref_id, info FROM tss_cascade_b ORDER BY ref_id"
    expect:
      rows: 0

cleanup:
  - sql: "DROP TRIGGER IF EXISTS `tss_main.ia`"
  - sql: "DROP TABLE IF EXISTS tss_log"
  - sql: "DROP TABLE IF EXISTS tss_detail"
  - sql: "DROP TABLE IF EXISTS tss_main"
