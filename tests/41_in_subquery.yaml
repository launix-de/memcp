# IN with subquery tests

metadata:
  version: "1.0"
  description: "IN and NOT IN with subquery tests"

setup:
  - sql: "DROP TABLE IF EXISTS in_renderjob"
  - sql: "DROP TABLE IF EXISTS in_fop_files"
  - sql: |
      CREATE TABLE in_fop_files (
        ID INT PRIMARY KEY,
        name VARCHAR(64)
      )
  - sql: |
      CREATE TABLE in_renderjob (
        ID INT PRIMARY KEY,
        result INT
      )
  - sql: |
      INSERT INTO in_fop_files (ID, name) VALUES
      (1, 'image1.png'), (2, 'image2.png'), (3, 'image3.png'),
      (4, 'image4.png'), (5, 'image5.png')
  - sql: |
      INSERT INTO in_renderjob (ID, result) VALUES
      (101, 1), (102, 3), (103, 3)

test_cases:
  - name: "IN subquery - files with render results"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (SELECT result FROM in_renderjob)
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  - name: "NOT IN subquery - files without render results"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID NOT IN (SELECT result FROM in_renderjob)
      ORDER BY ID
    expect:
      rows: 3
      data:
        - ID: 2
          name: "image2.png"
        - ID: 4
          name: "image4.png"
        - ID: 5
          name: "image5.png"

  # SQL standard NULL three-valued logic for NOT IN: when the RHS contains NULL
  # alongside non-NULL values, every NOT IN result is UNKNOWN (no row passes).
  # COUNT(*) = 0 rewrite would wrongly return all outer rows. Phase C / Finding 2
  # (general anti-decorrelation via domain helper, FAQ §22/§24/§25) must yield 0 rows.
  # Uses dedicated tables so failure does not pollute the surrounding test state.
  - name: "NOT IN with NULL in RHS alongside values — must return 0 rows (NULL→UNKNOWN)"
    setup:
      - sql: "DROP TABLE IF EXISTS in_null_outer"
      - sql: "DROP TABLE IF EXISTS in_null_inner_mixed"
      - sql: "CREATE TABLE in_null_outer (ID INT PRIMARY KEY)"
      - sql: "CREATE TABLE in_null_inner_mixed (r INT)"
      - sql: "INSERT INTO in_null_outer (ID) VALUES (1), (2), (3)"
      - sql: "INSERT INTO in_null_inner_mixed (r) VALUES (7), (NULL)"
    sql: |
      SELECT ID FROM in_null_outer
      WHERE ID NOT IN (SELECT r FROM in_null_inner_mixed)
      ORDER BY ID
    expect:
      rows: 0

  # NULL-only RHS: every outer row's `ID = NULL` is UNKNOWN, so NOT IN is
  # UNKNOWN for all outer rows. Result must be empty.
  - name: "NOT IN with NULL-only RHS — must return 0 rows (NULL→UNKNOWN)"
    setup:
      - sql: "DROP TABLE IF EXISTS in_null_inner_only"
      - sql: "CREATE TABLE in_null_inner_only (r INT)"
      - sql: "INSERT INTO in_null_inner_only (r) VALUES (NULL), (NULL)"
    sql: |
      SELECT ID FROM in_null_outer
      WHERE ID NOT IN (SELECT r FROM in_null_inner_only)
      ORDER BY ID
    expect:
      rows: 0

  - name: "IN subquery with WHERE in subquery"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (SELECT result FROM in_renderjob WHERE ID > 101)
      ORDER BY ID
    expect:
      rows: 1
      data:
        - ID: 3
          name: "image3.png"

  - name: "IN subquery returns no matches"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (SELECT result FROM in_renderjob WHERE ID > 1000)
      ORDER BY ID
    expect:
      rows: 0

  - name: "NOT IN subquery returns all when subquery empty"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID NOT IN (SELECT result FROM in_renderjob WHERE ID > 1000)
      ORDER BY ID
    expect:
      rows: 5
      data:
        - ID: 1
          name: "image1.png"
        - ID: 2
          name: "image2.png"
        - ID: 3
          name: "image3.png"
        - ID: 4
          name: "image4.png"
        - ID: 5
          name: "image5.png"

  - name: "IN subquery combined with other conditions"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (SELECT result FROM in_renderjob) AND name LIKE '%3%'
      ORDER BY ID
    expect:
      rows: 1
      data:
        - ID: 3
          name: "image3.png"

  - name: "EXPLAIN IN subquery uses materialized count helper cache"
    sql: |
      EXPLAIN SELECT ID, name FROM in_fop_files
      WHERE ID IN (SELECT result FROM in_renderjob)
      ORDER BY ID
    expect:
      rows: 1
      contains:
        - "touch_keytable"
        - "createcolumn"
        - "\"__cnt\""
        - ".in_renderjob:((get_column"

  # === UNION ALL inside IN subselect ===
  # Can be compiled to (or (scan...) (scan...))

  - name: "IN with UNION ALL subselect"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 102
      )
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  - name: "NOT IN with UNION ALL subselect"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID NOT IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 102
      )
      ORDER BY ID
    expect:
      rows: 3
      data:
        - ID: 2
          name: "image2.png"
        - ID: 4
          name: "image4.png"
        - ID: 5
          name: "image5.png"

  - name: "IN with UNION ALL using three branches"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 102
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 103
      )
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  - name: "IN with UNION ALL duplicate branches keeps semantics"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 102
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 103
      )
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  - name: "IN with UNION ALL including empty branch"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID > 1000
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 101
      )
      ORDER BY ID
    expect:
      rows: 1
      data:
        - ID: 1
          name: "image1.png"

  - name: "NOT IN with UNION ALL when all branches empty"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID NOT IN (
        SELECT result FROM in_renderjob WHERE ID > 1000
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID > 2000
      )
      ORDER BY ID
    expect:
      rows: 5
      data:
        - ID: 1
          name: "image1.png"
        - ID: 2
          name: "image2.png"
        - ID: 3
          name: "image3.png"
        - ID: 4
          name: "image4.png"
        - ID: 5
          name: "image5.png"

  - name: "IN with UNION ALL and outer filter"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 102
      )
      AND ID > 1
      ORDER BY ID
    expect:
      rows: 1
      data:
        - ID: 3
          name: "image3.png"

  - name: "IN with UNION ALL branch using inner ORDER BY/LIMIT"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM (
          SELECT result FROM in_renderjob ORDER BY ID DESC LIMIT 1
        ) AS top_result
        UNION ALL
        SELECT result FROM in_renderjob WHERE ID = 101
      )
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  - name: "IN with UNION ALL column count mismatch"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION ALL
        SELECT result, ID FROM in_renderjob WHERE ID = 102
      )
    expect:
      error: true

  - name: "IN with UNION DISTINCT not supported yet"
    sql: |
      SELECT ID, name FROM in_fop_files
      WHERE ID IN (
        SELECT result FROM in_renderjob WHERE ID = 101
        UNION
        SELECT result FROM in_renderjob WHERE ID = 102
      )
      ORDER BY ID
    expect:
      error: true

cleanup:
  - sql: "DROP TABLE IF EXISTS in_renderjob"
  - sql: "DROP TABLE IF EXISTS in_fop_files"
