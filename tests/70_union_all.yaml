# UNION ALL support
# fuchsbriefe uses 18+ UNION ALL queries combining file sources from multiple tables
# Implementation: (begin) block with two scans

metadata:
  version: "1.0"
  description: "UNION ALL combining results from multiple tables"

setup:
  - sql: "DROP TABLE IF EXISTS renderjob"
  - sql: "DROP TABLE IF EXISTS fop_files"
  - sql: |
      CREATE TABLE fop_files (
        ID INT PRIMARY KEY,
        name VARCHAR(64)
      )
  - sql: |
      CREATE TABLE renderjob (
        ID INT PRIMARY KEY,
        result INT
      )
  - sql: |
      INSERT INTO fop_files (ID, name) VALUES
      (1, 'image1.png'), (2, 'image2.png'), (3, 'image3.png'),
      (4, 'image4.png'), (5, 'image5.png')
  - sql: |
      INSERT INTO renderjob (ID, result) VALUES
      (101, 1), (102, 3), (103, 3)

test_cases:

  # === Basic UNION ALL ===

  - name: "UNION ALL two tables"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob WHERE ID <= 102
    expect:
      rows: 4

  - name: "UNION ALL preserves duplicates"
    sql: |
      SELECT name FROM fop_files WHERE ID = 1
      UNION ALL
      SELECT name FROM fop_files WHERE ID = 1
    expect:
      rows: 2
      data:
        - name: "image1.png"
        - name: "image1.png"

  - name: "UNION ALL three queries"
    sql: |
      SELECT name FROM fop_files WHERE ID = 1
      UNION ALL
      SELECT name FROM fop_files WHERE ID = 2
      UNION ALL
      SELECT name FROM fop_files WHERE ID = 3
    expect:
      rows: 3
      data:
        - name: "image1.png"
        - name: "image2.png"
        - name: "image3.png"

  - name: "UNION ALL with WHERE filters"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID >= 4
    expect:
      rows: 4

  # === UNION ALL with ORDER BY / LIMIT ===
  # Uses scan_order_multi for materialization-free sorted merge across tables.

  - name: "UNION ALL with ORDER BY"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID >= 4
      ORDER BY ID
    expect:
      rows: 4
      data:
        - ID: 1
          name: "image1.png"
        - ID: 2
          name: "image2.png"
        - ID: 4
          name: "image4.png"
        - ID: 5
          name: "image5.png"

  - name: "UNION ALL with LIMIT"
    sql: |
      SELECT ID, name FROM fop_files
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob
      LIMIT 3
    expect:
      rows: 3

  - name: "UNION ALL with ORDER BY and LIMIT"
    sql: |
      SELECT ID, name FROM fop_files
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob
      ORDER BY ID LIMIT 4
    expect:
      rows: 4
      data:
        - ID: 1
          name: "image1.png"
        - ID: 2
          name: "image2.png"
        - ID: 3
          name: "image3.png"
        - ID: 4
          name: "image4.png"

  - name: "UNION ALL with ORDER BY DESC and LIMIT"
    sql: |
      SELECT ID, name FROM fop_files
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob
      ORDER BY ID DESC LIMIT 3
    expect:
      rows: 3
      data:
        - ID: 103
          name: "3"
        - ID: 102
          name: "3"
        - ID: 101
          name: "1"

  - name: "UNION ALL with ORDER BY and OFFSET"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 3
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID >= 4
      ORDER BY ID LIMIT 2 OFFSET 1
    expect:
      rows: 2
      data:
        - ID: 2
          name: "image2.png"
        - ID: 3
          name: "image3.png"

  # === scan_order_multi: cross-table merge, 3+ branches, computed sort ===

  - name: "UNION ALL ORDER BY across different tables"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob WHERE ID <= 102
      ORDER BY ID
    expect:
      rows: 4
      data:
        - ID: 1
          name: "image1.png"
        - ID: 2
          name: "image2.png"
        - ID: 101
          name: "1"
        - ID: 102
          name: "3"

  - name: "UNION ALL ORDER BY three branches"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID = 3
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID = 1
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID = 5
      ORDER BY ID
    expect:
      rows: 3
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"
        - ID: 5
          name: "image5.png"

  - name: "UNION ALL ORDER BY with WHERE on both branches"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID BETWEEN 2 AND 4
      UNION ALL
      SELECT ID, CAST(result AS VARCHAR) AS name FROM renderjob WHERE result = 3
      ORDER BY ID
    expect:
      rows: 5
      data:
        - ID: 2
          name: "image2.png"
        - ID: 3
          name: "image3.png"
        - ID: 4
          name: "image4.png"
        - ID: 102
          name: "3"
        - ID: 103
          name: "3"

  - name: "UNION ALL ORDER BY second column"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 3
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID >= 4
      ORDER BY name
    expect:
      rows: 5
      data:
        - name: "image1.png"
        - name: "image2.png"
        - name: "image3.png"
        - name: "image4.png"
        - name: "image5.png"

  - name: "EXPLAIN UNION ALL ORDER BY uses scan_order_multi"
    sql: |
      EXPLAIN SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT ID, name FROM fop_files WHERE ID >= 4
      ORDER BY ID
    expect:
      rows: 1
      data_contains:
        - code: "scan_order_multi"

  # === UNION ALL in subquery / derived table ===

  - name: "UNION ALL as derived table"
    sql: |
      SELECT COUNT(*) AS c FROM (
        SELECT ID FROM fop_files
        UNION ALL
        SELECT ID FROM renderjob
      ) AS combined
    expect:
      rows: 1
      data:
        - c: 8

  - name: "EXISTS with UNION ALL subselect"
    sql: |
      SELECT ID, name FROM fop_files f
      WHERE EXISTS (
        SELECT 1 FROM renderjob WHERE result = f.ID
      )
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: "image3.png"

  # === UNION ALL branch shape / staged branch behavior ===

  - name: "UNION ALL keeps output aliases from first branch"
    sql: |
      SELECT ID AS file_id, name AS label FROM fop_files WHERE ID = 1
      UNION ALL
      SELECT result AS ignored_id, CAST(result AS VARCHAR) AS ignored_label FROM renderjob WHERE ID = 102
      ORDER BY file_id
    expect:
      rows: 2
      data:
        - file_id: 1
          label: "image1.png"
        - file_id: 3
          label: "3"

  - name: "UNION ALL with inner ORDER BY/LIMIT per branch"
    sql: |
      SELECT ID FROM (
        SELECT ID FROM fop_files ORDER BY ID DESC LIMIT 2
      ) AS branch_a
      UNION ALL
      SELECT ID FROM (
        SELECT result AS ID FROM renderjob ORDER BY result ASC LIMIT 1
      ) AS branch_b
      ORDER BY ID
    expect:
      error: true

  - name: "UNION ALL with grouped branch"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID <= 2
      UNION ALL
      SELECT result AS ID, CONCAT('r', CAST(COUNT(*) AS VARCHAR)) AS name
      FROM renderjob
      GROUP BY result
      HAVING result = 3
      ORDER BY ID
    expect:
      error: true

  - name: "UNION ALL with derived branch filtering"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID = 5
      UNION ALL
      SELECT ID, name FROM (
        SELECT ID, name FROM fop_files WHERE ID <= 2 ORDER BY ID DESC LIMIT 1
      ) AS picked
      ORDER BY ID
    expect:
      error: true

  - name: "UNION ALL with NULL payload in one branch"
    sql: |
      SELECT ID, name FROM fop_files WHERE ID = 1
      UNION ALL
      SELECT result AS ID, NULL AS name FROM renderjob WHERE ID = 102
      ORDER BY ID
    expect:
      rows: 2
      data:
        - ID: 1
          name: "image1.png"
        - ID: 3
          name: null

  # === Must-fail cases ===

  - name: "UNION ALL column count mismatch"
    sql: |
      SELECT ID FROM fop_files
      UNION ALL
      SELECT ID, name FROM fop_files
    expect:
      error: true

  - name: "UNION DISTINCT not supported yet"
    sql: |
      SELECT ID FROM fop_files WHERE ID <= 2
      UNION
      SELECT ID FROM fop_files WHERE ID >= 4
    expect:
      error: true

cleanup:
  - sql: "DROP TABLE IF EXISTS renderjob"
  - sql: "DROP TABLE IF EXISTS fop_files"
