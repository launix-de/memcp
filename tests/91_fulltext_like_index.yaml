# Fulltext LIKE index tests
# Verifies that non-prefix LIKE patterns produce correct results with ORDER BY,
# that the index is built after repeated queries, and that indexed scans are
# not slower than full scans (self-checked via system_statistic.scans).

metadata:
  version: "1.0"
  description: "Fulltext LIKE boundary matching with index building"

setup:
  - sql: "DROP TABLE IF EXISTS `ft_customers`"
  - sql: "DROP TABLE IF EXISTS `ft_large`"

test_cases:
  # --- Small table: correctness tests ---
  - name: "Create customer table"
    sql: |
      CREATE TABLE `ft_customers` (
        id INT PRIMARY KEY,
        vorname TEXT,
        nachname TEXT,
        birthdate DATE
      )
    expect:
      rows: 0

  - name: "Insert customer data"
    setup:
      - scm: |
          (begin
            (set rows (list
              (list 1 "Klaus" "Schmidt" "1980-01-15")
              (list 2 "Hans" "Müller" "1975-06-20")
              (list 3 "Klaus-Peter" "Weber" "1990-03-10")
              (list 4 "Anna" "Klaus" "1985-11-25")
              (list 5 "Heinrich" "Bauer" "1970-09-05")
              (list 6 "Klaudia" "Fischer" "1988-07-30")
              (list 7 "Peter" "Schwarz" "1992-02-14")
              (list 8 "Maria" "Hofmann" "1978-04-18")
              (list 9 "Nikolaus" "Meyer" "1983-12-06")
              (list 10 "Thomas" "Wagner" "1995-08-22")
              (list 11 "Klausine" "Braun" "1982-05-11")
              (list 12 "Frank" "Zimmermann" "1973-10-03")
              (list 13 "Erika" "Klein" "1991-01-28")
              (list 14 "Rolf" "Klausing" "1986-06-17")
              (list 15 "Sabine" "Richter" "1979-03-09")
              (list 16 "Werner" "Schuster" "1968-12-25")
              (list 17 "Gisela" "Neumann" "1994-07-04")
              (list 18 "Herbert" "Krause" "1976-11-13")
              (list 19 "Ute" "Schulze" "1989-09-21")
              (list 20 "Dieter" "Huber" "1972-02-08")))
            (insert "memcp-tests" "ft_customers" '("id" "vorname" "nachname" "birthdate") rows))
      - scm: "(rebuild)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers"
    expect:
      rows: 1
      data:
        - cnt: 20

  # --- Correctness: non-prefix LIKE with ORDER BY ---
  - name: "LIKE infix pattern matches correct rows"
    sql: "SELECT vorname, nachname FROM ft_customers WHERE vorname LIKE '%laus%' ORDER BY birthdate"
    expect:
      rows: 4
      data:
        - vorname: "Klaus"
          nachname: "Schmidt"
        - vorname: "Klausine"
          nachname: "Braun"
        - vorname: "Nikolaus"
          nachname: "Meyer"
        - vorname: "Klaus-Peter"
          nachname: "Weber"

  # --- Combined: equal + LIKE in AND ---
  - name: "AND equal + LIKE"
    sql: "SELECT vorname, nachname FROM ft_customers WHERE nachname = 'Meyer' AND vorname LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - vorname: "Nikolaus"
          nachname: "Meyer"

  # --- Incremental search pattern ---
  - name: "Incremental search step 1"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers WHERE vorname LIKE '%K%'"
    expect:
      rows: 1
      data:
        - cnt: 4

  - name: "Incremental search step 2"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers WHERE vorname LIKE '%Klaus%'"
    expect:
      rows: 1
      data:
        - cnt: 3

  # --- LIKE with ORDER BY DESC ---
  - name: "LIKE with ORDER BY DESC"
    sql: "SELECT vorname FROM ft_customers WHERE vorname LIKE '%er%' ORDER BY birthdate DESC"
    expect:
      rows: 5
      data:
        - vorname: "Peter"
        - vorname: "Klaus-Peter"
        - vorname: "Herbert"
        - vorname: "Dieter"
        - vorname: "Werner"

  # --- No matches ---
  - name: "LIKE no matches"
    sql: "SELECT vorname FROM ft_customers WHERE vorname LIKE '%zzz%'"
    expect:
      rows: 0

  # --- Large table: performance self-check ---
  - name: "Create large table"
    sql: |
      CREATE TABLE `ft_large` (
        id INT PRIMARY KEY,
        name TEXT,
        category INT,
        score INT
      )
    expect:
      rows: 0

  - name: "Insert 10000 rows (needle-in-a-haystack)"
    setup:
      - scm: |
          (begin
            (set rows (map (produceN 10000) (lambda (i)
              (list i
                (match i
                  42 "Klaus Heinemann"
                  1337 "Nikolaus Weber"
                  5000 "Klausberger Fritz"
                  7777 "Hans Klausner"
                  9999 "Klausmüller Gerd"
                  _ (concat "Person_" i))
                (mod (* i 7) 50)
                (* i 3)))))
            (insert "memcp-tests" "ft_large" '("id" "name" "category" "score") rows))
      - scm: "(rebuild)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large"
    expect:
      rows: 1
      data:
        - cnt: 10000

  - name: "Rebuild to main storage for index efficiency"
    setup:
      - scm: "(rebuild)"
    sql: "SELECT 1 AS ok"
    expect:
      rows: 1

  - name: "Enable scan debugging and clear log"
    setup:
      - scm: '(settings "ScanDebugging" true)'
      - scm: '(sleep 100)'
      - sql: "DELETE FROM `system_statistic`.`scans` WHERE `table` = 'ft_large'"
    sql: "SELECT 1 AS ok"
    expect:
      rows: 1

  # --- 6 identical LIKE runs: needle-in-a-haystack (5 matches in 10000) ---
  - name: "Large LIKE run 1"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  - name: "Large LIKE run 2"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  - name: "Large LIKE run 3"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  - name: "Large LIKE run 4"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  - name: "Large LIKE run 5"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  - name: "Large LIKE run 6"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - cnt: 5

  # --- Wait for async scan logs to be written ---
  - name: "Wait for scan logs"
    setup:
      - scm: '(sleep 200)'
    sql: "SELECT 1 AS ok"
    expect:
      rows: 1

  # --- Self-check: indexed runs must not be slower than pre-index runs ---
  # Compare sum of first 3 exec_ns (pre-index) vs last 3 (indexed).
  # The ROW_NUMBER is computed AFTER filtering to ft_large-only rows.
  - name: "Indexed scans not slower than full scans"
    sql: |
      SELECT early_ns, late_ns, CASE WHEN late_ns <= early_ns * 2 THEN 'ok' ELSE 'FAIL' END AS result
      FROM (
        SELECT
          SUM(CASE WHEN rn <= 3 THEN exec_ns ELSE 0 END) AS early_ns,
          SUM(CASE WHEN rn > 3 THEN exec_ns ELSE 0 END) AS late_ns
        FROM (
          SELECT exec_ns, ROW_NUMBER() OVER (ORDER BY timestamp) AS rn
          FROM `system_statistic`.`scans`
          WHERE `table` = 'ft_large'
        ) t
        WHERE rn <= 6
      ) s
    expect:
      rows: 1
      data:
        - result: "ok"
    on_fail:
      - sql: "SELECT ROW_NUMBER() OVER (ORDER BY timestamp) AS rn, exec_ns, analyze_ns, index_cols FROM `system_statistic`.`scans` WHERE `table` = 'ft_large' ORDER BY timestamp LIMIT 10"

  # --- Read scan timings for manual inspection ---
  - name: "Show scan timings"
    sql: "SELECT ROW_NUMBER() OVER (ORDER BY timestamp) AS rn, exec_ns, analyze_ns, index_cols FROM `system_statistic`.`scans` WHERE `table` = 'ft_large' ORDER BY timestamp LIMIT 6"
    expect:
      rows: 6
    noncritical: true

  - name: "Disable scan debugging"
    setup:
      - scm: '(settings "ScanDebugging" false)'
    sql: "SELECT 1 AS ok"
    expect:
      rows: 1

  # --- Correctness on large table after index is built ---
  # Needles: id=42 "Klaus Heinemann", id=1337 "Nikolaus Weber",
  # id=5000 "Klausberger Fritz", id=7777 "Hans Klausner", id=9999 "Klausmüller Gerd"
  # Haystack: "Person_0" .. "Person_9999" (minus the 5 needles)

  - name: "Large LIKE %laus% finds all 5 needles"
    sql: "SELECT name, id FROM ft_large WHERE name LIKE '%laus%' ORDER BY id"
    expect:
      rows: 5
      data:
        - name: "Klaus Heinemann"
          id: 42
        - name: "Nikolaus Weber"
          id: 1337
        - name: "Klausberger Fritz"
          id: 5000
        - name: "Hans Klausner"
          id: 7777
        - name: "Klausmüller Gerd"
          id: 9999

  - name: "Large LIKE %Klaus% (capitalized)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%Klaus%'"
    expect:
      rows: 1
      data:
        - cnt: 4

  - name: "Large LIKE %Weber% finds 1"
    sql: "SELECT name FROM ft_large WHERE name LIKE '%Weber%'"
    expect:
      rows: 1
      data:
        - name: "Nikolaus Weber"

  - name: "Large LIKE %Person_1% (haystack match)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%Person_1%'"
    expect:
      rows: 1

  - name: "Large LIKE no match"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%zzzzz%'"
    expect:
      rows: 1
      data:
        - cnt: 0

  - name: "Large LIKE prefix anchored Kl%"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE 'Kl%'"
    expect:
      rows: 1
      data:
        - cnt: 3

  - name: "Large LIKE ORDER BY DESC + LIMIT"
    sql: "SELECT name, id FROM ft_large WHERE name LIKE '%laus%' ORDER BY id DESC LIMIT 3"
    expect:
      rows: 3
      data:
        - name: "Klausmüller Gerd"
          id: 9999
        - name: "Hans Klausner"
          id: 7777
        - name: "Klausberger Fritz"
          id: 5000

  - name: "Large AND equal + LIKE"
    sql: "SELECT name FROM ft_large WHERE name LIKE '%laus%' AND category = 0"
    expect:
      rows: 1

  # --- Low selectivity: every other row matches (interval merging stress test) ---
  - name: "Low selectivity LIKE (Person_ matches 9995 of 10000)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%Person_%'"
    expect:
      rows: 1
      data:
        - cnt: 9995

  - name: "Low selectivity LIKE with ORDER BY + LIMIT"
    sql: "SELECT name, id FROM ft_large WHERE name LIKE '%Person_%' ORDER BY id DESC LIMIT 3"
    expect:
      rows: 3
      data:
        - name: "Person_9998"
          id: 9998
        - name: "Person_9997"
          id: 9997
        - name: "Person_9996"
          id: 9996

  # --- Cross-check ---
  - name: "Cross-check LIKE vs total"
    sql: |
      SELECT
        (SELECT COUNT(*) FROM ft_large WHERE name LIKE '%laus%') AS like_cnt,
        (SELECT COUNT(*) FROM ft_large) AS total
    expect:
      rows: 1
      data:
        - like_cnt: 5
          total: 10000

cleanup:
  - sql: "DROP TABLE IF EXISTS `ft_customers`"
  - sql: "DROP TABLE IF EXISTS `ft_large`"
