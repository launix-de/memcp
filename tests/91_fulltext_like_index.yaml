# Fulltext LIKE index tests
# Verifies that non-prefix LIKE patterns produce correct results with ORDER BY,
# that the index is built after repeated queries, and that indexed scans are
# not slower than full scans (self-checked via system_statistic.scans).

metadata:
  version: "1.0"
  description: "Fulltext LIKE boundary matching with index building"

setup:
  - sql: "DROP TABLE IF EXISTS `ft_customers`"
  - sql: "DROP TABLE IF EXISTS `ft_large`"

test_cases:
  # --- Small table: correctness tests ---
  - name: "Create customer table"
    sql: |
      CREATE TABLE `ft_customers` (
        id INT PRIMARY KEY,
        vorname TEXT,
        nachname TEXT,
        birthdate DATE
      )
    expect:
      rows: 0

  - name: "Insert customer data"
    setup:
      - scm: |
          (begin
            (set rows (list
              (list 1 "Klaus" "Schmidt" "1980-01-15")
              (list 2 "Hans" "Müller" "1975-06-20")
              (list 3 "Klaus-Peter" "Weber" "1990-03-10")
              (list 4 "Anna" "Klaus" "1985-11-25")
              (list 5 "Heinrich" "Bauer" "1970-09-05")
              (list 6 "Klaudia" "Fischer" "1988-07-30")
              (list 7 "Peter" "Schwarz" "1992-02-14")
              (list 8 "Maria" "Hofmann" "1978-04-18")
              (list 9 "Nikolaus" "Meyer" "1983-12-06")
              (list 10 "Thomas" "Wagner" "1995-08-22")
              (list 11 "Klausine" "Braun" "1982-05-11")
              (list 12 "Frank" "Zimmermann" "1973-10-03")
              (list 13 "Erika" "Klein" "1991-01-28")
              (list 14 "Rolf" "Klausing" "1986-06-17")
              (list 15 "Sabine" "Richter" "1979-03-09")
              (list 16 "Werner" "Schuster" "1968-12-25")
              (list 17 "Gisela" "Neumann" "1994-07-04")
              (list 18 "Herbert" "Krause" "1976-11-13")
              (list 19 "Ute" "Schulze" "1989-09-21")
              (list 20 "Dieter" "Huber" "1972-02-08")))
            (insert "memcp-tests" "ft_customers" '("id" "vorname" "nachname" "birthdate") rows))
      - scm: "(rebuild)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers"
    expect:
      rows: 1
      data:
        - cnt: 20

  # --- Correctness: non-prefix LIKE with ORDER BY ---
  - name: "LIKE infix pattern matches correct rows"
    sql: "SELECT vorname, nachname FROM ft_customers WHERE vorname LIKE '%laus%' ORDER BY birthdate"
    expect:
      rows: 4
      data:
        - vorname: "Klaus"
          nachname: "Schmidt"
        - vorname: "Klausine"
          nachname: "Braun"
        - vorname: "Nikolaus"
          nachname: "Meyer"
        - vorname: "Klaus-Peter"
          nachname: "Weber"

  # --- Combined: equal + LIKE in AND ---
  - name: "AND equal + LIKE"
    sql: "SELECT vorname, nachname FROM ft_customers WHERE nachname = 'Meyer' AND vorname LIKE '%laus%'"
    expect:
      rows: 1
      data:
        - vorname: "Nikolaus"
          nachname: "Meyer"

  # --- Incremental search pattern ---
  - name: "Incremental search step 1"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers WHERE vorname LIKE '%K%'"
    expect:
      rows: 1
      data:
        - cnt: 4

  - name: "Incremental search step 2"
    sql: "SELECT COUNT(*) AS cnt FROM ft_customers WHERE vorname LIKE '%Klaus%'"
    expect:
      rows: 1
      data:
        - cnt: 3

  # --- LIKE with ORDER BY DESC ---
  - name: "LIKE with ORDER BY DESC"
    sql: "SELECT vorname FROM ft_customers WHERE vorname LIKE '%er%' ORDER BY birthdate DESC"
    expect:
      rows: 5
      data:
        - vorname: "Peter"
        - vorname: "Klaus-Peter"
        - vorname: "Herbert"
        - vorname: "Dieter"
        - vorname: "Werner"

  # --- No matches ---
  - name: "LIKE no matches"
    sql: "SELECT vorname FROM ft_customers WHERE vorname LIKE '%zzz%'"
    expect:
      rows: 0

  # --- Large table: 30k rows (single shard) for performance self-check ---
  - name: "Create large table"
    sql: |
      CREATE TABLE `ft_large` (
        id INT PRIMARY KEY,
        name TEXT
      )
    expect:
      rows: 0

  - name: "Insert 30000 rows (needle-in-a-haystack)"
    setup:
      - scm: |
          (begin
            (set rows (map (produceN 30000) (lambda (i)
              (list i
                (match i
                  42 "Klaus Heinemann"
                  1337 "Nikolaus Weber"
                  15000 "Klausberger Fritz"
                  22777 "Hans Klausner"
                  29999 "Klausmüller Gerd"
                  _ (concat "Person_" i))))))
            (insert "memcp-tests" "ft_large" '("id" "name") rows))
      - scm: "(rebuild)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large"
    expect:
      rows: 1
      data:
        - cnt: 30000

  # --- Speedup test helper: run query 8x, compare first 2 (full scan) vs last 4 (indexed, cached) ---
  # Minimum speedup: 3x (indexed late_ns must be < early_ns / 3 * 2, i.e. late avg < early avg / 3)
  # early = runs 1-2 (no index), late = runs 5-8 (indexed + cached)

  # -- Test 1: LIKE needle-in-haystack (5 matches in 30k) --
  - name: "Enable scan debugging for LIKE test"
    setup:
      - scm: '(settings "ScanDebugging" true)'
      - scm: '(sleep 0.1)'
      - sql: "DELETE FROM `system_statistic`.`scans` WHERE `table` = 'ft_large'"
    sql: "SELECT 1 AS ok"
    expect:
      rows: 1

  - name: "LIKE run 1"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 2"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 3"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 4"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 5"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 6"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 7"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }
  - name: "LIKE run 8"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%'"
    expect: { rows: 1, data: [{ cnt: 5 }] }

  - name: "Wait for LIKE scan logs"
    setup:
      - scm: '(sleep 0.2)'
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  - name: "LIKE speedup >= 3x"
    sql: |
      SELECT early_ns, late_ns,
        CASE WHEN late_ns * 3 <= early_ns * 2 THEN 'ok' ELSE 'FAIL' END AS result
      FROM (
        SELECT
          SUM(CASE WHEN rn <= 2 THEN exec_ns ELSE 0 END) AS early_ns,
          SUM(CASE WHEN rn >= 5 THEN exec_ns ELSE 0 END) AS late_ns
        FROM (
          SELECT exec_ns, ROW_NUMBER() OVER (ORDER BY timestamp) AS rn
          FROM `system_statistic`.`scans`
          WHERE `table` = 'ft_large'
        ) t WHERE rn <= 8
      ) s
    expect: { rows: 1, data: [{ result: "ok" }] }
    on_fail:
      - sql: "SELECT ROW_NUMBER() OVER (ORDER BY timestamp) AS rn, exec_ns FROM `system_statistic`.`scans` WHERE `table` = 'ft_large' ORDER BY timestamp LIMIT 8"

  # -- Test 2: Equal id=42 (regression test, must not be slower) --
  - name: "Clear log for Equal test"
    setup:
      - scm: '(sleep 0.1)'
      - sql: "DELETE FROM `system_statistic`.`scans` WHERE `table` = 'ft_large'"
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  - name: "Equal run 1"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 2"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 3"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 4"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 5"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 6"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 7"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }
  - name: "Equal run 8"
    sql: "SELECT name FROM ft_large WHERE id = 42"
    expect: { rows: 1, data: [{ name: "Klaus Heinemann" }] }

  - name: "Wait for Equal scan logs"
    setup:
      - scm: '(sleep 0.2)'
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  - name: "Equal speedup >= 3x"
    sql: |
      SELECT early_ns, late_ns,
        CASE WHEN late_ns * 3 <= early_ns * 2 THEN 'ok' ELSE 'FAIL' END AS result
      FROM (
        SELECT
          SUM(CASE WHEN rn <= 2 THEN exec_ns ELSE 0 END) AS early_ns,
          SUM(CASE WHEN rn >= 5 THEN exec_ns ELSE 0 END) AS late_ns
        FROM (
          SELECT exec_ns, ROW_NUMBER() OVER (ORDER BY timestamp) AS rn
          FROM `system_statistic`.`scans`
          WHERE `table` = 'ft_large'
        ) t WHERE rn <= 8
      ) s
    expect: { rows: 1, data: [{ result: "ok" }] }
    on_fail:
      - sql: "SELECT ROW_NUMBER() OVER (ORDER BY timestamp) AS rn, exec_ns FROM `system_statistic`.`scans` WHERE `table` = 'ft_large' ORDER BY timestamp LIMIT 8"

  # -- Test 3: LIKE + Range (must be >= 3x faster) --
  - name: "Clear log for LIKE+Range test"
    setup:
      - scm: '(sleep 0.1)'
      - sql: "DELETE FROM `system_statistic`.`scans` WHERE `table` = 'ft_large'"
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  - name: "LIKE+Range run 1"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 2"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 3"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 4"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 5"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 6"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 7"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }
  - name: "LIKE+Range run 8"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }

  - name: "Wait for LIKE+Range scan logs"
    setup:
      - scm: '(sleep 0.2)'
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  - name: "LIKE+Range speedup >= 3x"
    sql: |
      SELECT early_ns, late_ns,
        CASE WHEN late_ns * 3 <= early_ns * 2 THEN 'ok' ELSE 'FAIL' END AS result
      FROM (
        SELECT
          SUM(CASE WHEN rn <= 2 THEN exec_ns ELSE 0 END) AS early_ns,
          SUM(CASE WHEN rn >= 5 AND rn <= 8 THEN exec_ns ELSE 0 END) AS late_ns
        FROM (
          SELECT exec_ns, ROW_NUMBER() OVER (ORDER BY timestamp) AS rn
          FROM `system_statistic`.`scans`
          WHERE `table` = 'ft_large'
        ) t WHERE rn <= 8
      ) s
    expect: { rows: 1, data: [{ result: "ok" }] }
    on_fail:
      - sql: "SELECT ROW_NUMBER() OVER (ORDER BY timestamp) AS rn, exec_ns FROM `system_statistic`.`scans` WHERE `table` = 'ft_large' ORDER BY timestamp LIMIT 8"

  - name: "Disable scan debugging"
    setup:
      - scm: '(settings "ScanDebugging" false)'
    sql: "SELECT 1 AS ok"
    expect: { rows: 1 }

  # --- Range operator corner cases (>, >=, <, <=) with LIKE ---
  # Needles at id: 42, 1337, 15000, 22777, 29999
  - name: "LIKE + id > 15000 (strict, excludes boundary)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id > 15000"
    expect: { rows: 1, data: [{ cnt: 2 }] }

  - name: "LIKE + id >= 15000 (inclusive, includes boundary)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id >= 15000"
    expect: { rows: 1, data: [{ cnt: 3 }] }

  - name: "LIKE + id < 1337 (strict, excludes boundary)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id < 1337"
    expect: { rows: 1, data: [{ cnt: 1 }] }

  - name: "LIKE + id <= 1337 (inclusive, includes boundary)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id <= 1337"
    expect: { rows: 1, data: [{ cnt: 2 }] }

  - name: "LIKE + BETWEEN (id >= 1337 AND id <= 22777)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id >= 1337 AND id <= 22777"
    expect: { rows: 1, data: [{ cnt: 3 }] }

  - name: "LIKE + id = exact needle"
    sql: "SELECT name FROM ft_large WHERE name LIKE '%laus%' AND id = 22777"
    expect: { rows: 1, data: [{ name: "Hans Klausner" }] }

  - name: "LIKE + id = non-needle"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%laus%' AND id = 100"
    expect: { rows: 1, data: [{ cnt: 0 }] }

  # --- Correctness on large table after index is built ---
  - name: "Large LIKE %laus% finds all 5 needles"
    sql: "SELECT name, id FROM ft_large WHERE name LIKE '%laus%' ORDER BY id"
    expect:
      rows: 5
      data:
        - name: "Klaus Heinemann"
          id: 42
        - name: "Nikolaus Weber"
          id: 1337
        - name: "Klausberger Fritz"
          id: 15000
        - name: "Hans Klausner"
          id: 22777
        - name: "Klausmüller Gerd"
          id: 29999

  - name: "Large LIKE no match"
    sql: "SELECT COUNT(*) AS cnt FROM ft_large WHERE name LIKE '%zzzzz%'"
    expect: { rows: 1, data: [{ cnt: 0 }] }

  - name: "Large LIKE ORDER BY DESC + LIMIT"
    sql: "SELECT name, id FROM ft_large WHERE name LIKE '%laus%' ORDER BY id DESC LIMIT 3"
    expect:
      rows: 3
      data:
        - name: "Klausmüller Gerd"
          id: 29999
        - name: "Hans Klausner"
          id: 22777
        - name: "Klausberger Fritz"
          id: 15000

  - name: "Cross-check LIKE vs total"
    sql: |
      SELECT
        (SELECT COUNT(*) FROM ft_large WHERE name LIKE '%laus%') AS like_cnt,
        (SELECT COUNT(*) FROM ft_large) AS total
    expect: { rows: 1 }

  # --- Interval merge stress: alternating matches (Animal/Person/Animal/...) ---
  # A naive implementation would create one interval per match, producing a
  # skip list larger than the data. The 3-block merge tolerance must collapse
  # adjacent intervals to keep the list small.
  - name: "Create alternating table"
    sql: |
      CREATE TABLE IF NOT EXISTS `ft_alternating` (
        id INT PRIMARY KEY,
        name TEXT
      )
    expect:
      rows: 0

  - name: "Insert alternating data"
    setup:
      - scm: |
          (begin
            (set rows (map (produceN 10000) (lambda (i)
              (list i (match (mod i 3)
                0 "Animal"
                1 "Person"
                _ "Object")))))
            (insert "memcp-tests" "ft_alternating" '("id" "name") rows))
      - scm: "(rebuild)"
    sql: "SELECT COUNT(*) AS cnt FROM ft_alternating"
    expect:
      rows: 1
      data:
        - cnt: 10000

  - name: "Alternating LIKE correctness"
    sql: "SELECT COUNT(*) AS cnt FROM ft_alternating WHERE name LIKE '%Person%'"
    expect:
      rows: 1
      data:
        - cnt: 3333

  - name: "Alternating LIKE with ORDER BY + LIMIT"
    sql: "SELECT id FROM ft_alternating WHERE name LIKE '%Person%' ORDER BY id LIMIT 5"
    expect:
      rows: 5
      data:
        - id: 1
        - id: 4
        - id: 7
        - id: 10
        - id: 13

  # --- Cross-check alternating ---
  - name: "Cross-check alternating LIKE vs total"
    sql: |
      SELECT
        (SELECT COUNT(*) FROM ft_alternating WHERE name LIKE '%Person%') AS like_cnt,
        (SELECT COUNT(*) FROM ft_alternating) AS total
    expect:
      rows: 1
      data:
        - like_cnt: 3333
          total: 10000

cleanup:
  - sql: "DROP TABLE IF EXISTS `ft_customers`"
  - sql: "DROP TABLE IF EXISTS `ft_large`"
  - sql: "DROP TABLE IF EXISTS `ft_alternating`"
