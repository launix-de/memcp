metadata:
  version: "1.0"
  description: "SPARQL BIND, built-in functions, IF/BOUND/COALESCE"
  isolated: true

setup: []

test_cases:

  # BIND
  - name: "BIND: constant"
    sparql: |
      SELECT ?x WHERE { BIND("hello" AS ?x) }
    expect:
      rows: 1
      data:
        - "?x": "hello"

  - name: "BIND: STR() on IRI"
    ttl_data: |
      @prefix b02: <http://bind02.org/> .
      b02:item b02:val "x" .
    sparql: |
      @prefix b02: <http://bind02.org/> .
      SELECT ?str WHERE { ?s b02:val ?v . BIND(STR(?s) AS ?str) }
    expect:
      rows: 1
      data:
        - "?str": "http://bind02.org/item"

  - name: "BIND: IRI() from string"
    sparql: |
      SELECT ?i WHERE { BIND(IRI("http://example.org/test") AS ?i) }
    expect:
      rows: 1
      data:
        - "?i": "http://example.org/test"

  - name: "BIND: CONCAT"
    sparql: |
      SELECT ?c WHERE { BIND(CONCAT("hello", " ", "world") AS ?c) }
    expect:
      rows: 1
      data:
        - "?c": "hello world"

  # IF / BOUND / COALESCE
  - name: "IF: true branch"
    sparql: |
      SELECT ?r WHERE { BIND(IF(1 > 0, "yes", "no") AS ?r) }
    expect:
      rows: 1
      data:
        - "?r": "yes"

  - name: "BOUND: with OPTIONAL"
    ttl_data: |
      @prefix b06: <http://bind06.org/> .
      b06:alice b06:name "Alice" .
      b06:alice b06:email "a@ex.org" .
      b06:bob b06:name "Bob" .
    sparql: |
      @prefix b06: <http://bind06.org/> .
      SELECT ?n, ?label WHERE {
        ?s b06:name ?n .
        OPTIONAL { ?s b06:email ?e }
        BIND(IF(BOUND(?e), ?e, "no email") AS ?label)
      }
    expect:
      rows: 2

  - name: "COALESCE"
    ttl_data: |
      @prefix b07: <http://bind07.org/> .
      b07:a b07:name "Alice" .
      b07:b b07:nick "Bobby" .
    sparql: |
      @prefix b07: <http://bind07.org/> .
      SELECT ?label WHERE {
        ?s ?p ?any .
        FILTER(?p = b07:name || ?p = b07:nick)
        OPTIONAL { ?s b07:name ?n }
        OPTIONAL { ?s b07:nick ?k }
        BIND(COALESCE(?n, ?k, "unknown") AS ?label)
      }
    expect:
      rows: 2

  # String functions
  - name: "STRLEN"
    ttl_data: |
      @prefix b08: <http://bind08.org/> .
      b08:item b08:val "hello" .
    sparql: |
      @prefix b08: <http://bind08.org/> .
      SELECT ?len WHERE { b08:item b08:val ?v . BIND(STRLEN(?v) AS ?len) }
    expect:
      rows: 1
      data:
        - "?len": 5

  - name: "CONTAINS"
    ttl_data: |
      @prefix b09: <http://bind09.org/> .
      b09:a b09:text "hello world" .
      b09:b b09:text "goodbye" .
    sparql: |
      @prefix b09: <http://bind09.org/> .
      SELECT ?s WHERE { ?s b09:text ?t . FILTER(CONTAINS(?t, "hello")) }
    expect:
      rows: 1

  - name: "STRSTARTS / STRENDS"
    ttl_data: |
      @prefix b10: <http://bind10.org/> .
      b10:a b10:name "Alice" .
      b10:b b10:name "Bob" .
      b10:c b10:name "Anna" .
    sparql: |
      @prefix b10: <http://bind10.org/> .
      SELECT ?s WHERE { ?s b10:name ?n . FILTER(STRSTARTS(?n, "A")) }
    expect:
      rows: 2

cleanup: []
