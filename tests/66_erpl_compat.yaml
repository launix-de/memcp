# ERPL compatibility: scalar subselect alias in GROUP BY keytable,
# trigger table reference with dot in trigger name,
# ALTER TABLE DROP COLUMN IF EXISTS.

metadata:
  version: "1.0"
  description: "ERPL dbcheck compatibility issues"

setup:
  - sql: "DROP TABLE IF EXISTS ec_fahrt"
  - sql: "DROP TABLE IF EXISTS ec_users"
  - sql: "DROP TABLE IF EXISTS ec_log"
  - sql: "DROP TABLE IF EXISTS ec_main"
  - sql: |
      CREATE TABLE ec_users (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        name TEXT
      )
  - sql: |
      CREATE TABLE ec_fahrt (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        fahrer INT,
        gefKm INT
      )
  - sql: |
      CREATE TABLE ec_log (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        ref_id INT,
        info TEXT
      )
  - sql: |
      CREATE TABLE ec_main (
        ID INT PRIMARY KEY AUTO_INCREMENT,
        val TEXT,
        old_col INT
      )
  - sql: "INSERT INTO ec_users VALUES (1, 'Alice'), (2, 'Bob')"
  - sql: "INSERT INTO ec_fahrt VALUES (1, 1, 100), (2, 1, 200), (3, 2, 50)"

test_cases:

  # --- Bug 1: scalar subselect with alias in GROUP BY context ---
  # The generated table alias (e.g. U9Ykj94O) for the subselect's FROM
  # uses '.' as separator in lambda params instead of the internal '\0'.
  # This causes "Column does not exist: user.U9Ykj94O".

  - name: "scalar subselect in GROUP BY select list"
    sql: |
      SELECT f.fahrer,
        SUM(f.gefKm) AS total,
        (SELECT u.name FROM ec_users u WHERE u.ID = f.fahrer LIMIT 1) AS driver_name
      FROM ec_fahrt f
      GROUP BY f.fahrer
      ORDER BY f.fahrer
    expect:
      rows: 2
      data:
        - fahrer: 1
          total: 300
          driver_name: "Alice"
        - fahrer: 2
          total: 50
          driver_name: "Bob"

  - name: "scalar subselect in GROUP BY with session var"
    sql: "SET @fop_user = 1"
  - name: "scalar subselect in GROUP BY with WHERE and session var"
    sql: |
      SELECT f.fahrer,
        SUM(f.gefKm) AS total,
        (SELECT u.name FROM ec_users u WHERE u.ID = f.fahrer AND u.ID = @fop_user LIMIT 1) AS driver_name
      FROM ec_fahrt f
      WHERE f.fahrer = 1
      GROUP BY f.fahrer
    expect:
      rows: 1
      data:
        - fahrer: 1
          total: 300
          driver_name: "Alice"

  - name: "scalar subselect without GROUP BY (baseline)"
    sql: |
      SELECT f.ID, f.fahrer,
        (SELECT u.name FROM ec_users u WHERE u.ID = f.fahrer LIMIT 1) AS driver_name
      FROM ec_fahrt f
      ORDER BY f.ID
    expect:
      rows: 3
      data:
        - ID: 1
          fahrer: 1
          driver_name: "Alice"
        - ID: 2
          fahrer: 1
          driver_name: "Alice"
        - ID: 3
          fahrer: 2
          driver_name: "Bob"

  # --- Bug 2: trigger with dot in name references other table ---
  # CREATE TRIGGER `tablename.ua` — the dot in the trigger name must not
  # cause the table reference inside the trigger body to be mangled.
  # Pattern: trigger on ec_main inserts into ec_log, references ec_users.

  - name: "trigger with dot in name referencing other tables"
    sql: |
      CREATE TRIGGER `ec_main.ia` AFTER INSERT ON `ec_main` FOR EACH ROW BEGIN
        INSERT INTO `ec_log` (`ref_id`, `info`)
          VALUES (NEW.`ID`, 'inserted');
      END

  - name: "trigger fires correctly despite dot in trigger name"
    sql: "INSERT INTO ec_main (val) VALUES ('test')"

  - name: "verify trigger with dot in name worked"
    sql: "SELECT ref_id, info FROM ec_log ORDER BY ref_id"
    expect:
      rows: 1
      data:
        - ref_id: 1
          info: "inserted"

  - name: "drop trigger with dot in name"
    sql: "DROP TRIGGER IF EXISTS `ec_main.ia`"

  - name: "trigger with dot in name + INSERT SELECT from other table"
    sql: |
      CREATE TRIGGER `ec_main.ia2` AFTER INSERT ON `ec_main` FOR EACH ROW BEGIN
        INSERT INTO `ec_log` (`ref_id`, `info`)
          SELECT u.`ID`, u.`name`
          FROM `ec_users` u
          WHERE u.`ID` = NEW.`ID`;
      END

  - name: "trigger dot-name + INSERT SELECT fires"
    sql: "INSERT INTO ec_main VALUES (2, 'hello', NULL)"

  - name: "verify trigger dot-name + INSERT SELECT"
    sql: "SELECT ref_id, info FROM ec_log WHERE ref_id = 2"
    expect:
      rows: 1
      data:
        - ref_id: 2
          info: "Bob"

  # --- Bug 3: ALTER TABLE DROP COLUMN IF EXISTS ---
  # dbcheck.php does ALTER TABLE DROP COLUMN for columns that may not exist.
  # MySQL silently handles IF EXISTS; memcp must not error.

  - name: "ALTER TABLE DROP COLUMN IF EXISTS on existing column"
    sql: "ALTER TABLE ec_main DROP COLUMN IF EXISTS old_col"

  - name: "verify column was dropped"
    sql: "SELECT ID, val FROM ec_main ORDER BY ID"
    expect:
      rows: 2

  - name: "ALTER TABLE DROP COLUMN IF EXISTS on non-existing column"
    sql: "ALTER TABLE ec_main DROP COLUMN IF EXISTS nonexistent_col"

  - name: "table still works after dropping non-existing column"
    sql: "SELECT COUNT(*) AS c FROM ec_main"
    expect:
      rows: 1
      data:
        - c: 2

  # --- Bug 4: multi-table UPDATE with correlated subselect ---
  # UPDATE tbl1, tbl2 SET tbl1.col = (SELECT ... FROM tbl3 WHERE unqualified_col ...)
  # The unqualified column in the subselect must resolve against tbl3 (subselect FROM),
  # not against tbl1/tbl2 (UPDATE tables). Pattern from campaign.ia trigger.

  - sql: "DROP TABLE IF EXISTS mt_log"
  - sql: "DROP TABLE IF EXISTS mt_assoc"
  - sql: "DROP TABLE IF EXISTS mt_source"
  - sql: "CREATE TABLE mt_source (ID INT PRIMARY KEY, name TEXT, date1 BIGINT, date2 BIGINT)"
  - sql: "CREATE TABLE mt_assoc (ID INT PRIMARY KEY, src_id INT, target INT, creation BIGINT)"
  - sql: "CREATE TABLE mt_log (ID INT PRIMARY KEY AUTO_INCREMENT, ref_id INT, dt BIGINT, notiz TEXT)"
  - sql: "INSERT INTO mt_source VALUES (1, 'hello', 3000, 6000)"
  - sql: "INSERT INTO mt_assoc VALUES (1, 1, 10, 1000)"
  - sql: "INSERT INTO mt_log VALUES (1, 1, 999, 'old')"

  - name: "multi-table UPDATE with subselect unqualified column from subselect FROM"
    sql: |
      UPDATE `mt_log`, `mt_assoc` AS `A` SET
        `mt_log`.`notiz` = (SELECT `s`.`name` FROM `mt_source` `s`
          WHERE `s`.`ID` = `A`.`src_id`
          AND CASE WHEN `date2` IS NULL THEN TRUE ELSE `date2` >= 500 END
          LIMIT 1)
      WHERE `mt_log`.`ref_id` = `A`.`ID` AND `A`.`src_id` = 1

  - name: "verify multi-table UPDATE resolved subselect correctly"
    sql: "SELECT notiz FROM mt_log WHERE ref_id = 1"
    expect:
      rows: 1
      data:
        - notiz: "hello"

cleanup:
  - sql: "DROP TRIGGER IF EXISTS `ec_main.ia`"
  - sql: "DROP TRIGGER IF EXISTS `ec_main.ia2`"
  - sql: "DROP TABLE IF EXISTS ec_log"
  - sql: "DROP TABLE IF EXISTS ec_fahrt"
  - sql: "DROP TABLE IF EXISTS ec_users"
  - sql: "DROP TABLE IF EXISTS ec_main"
  - sql: "DROP TABLE IF EXISTS mt_log"
  - sql: "DROP TABLE IF EXISTS mt_assoc"
  - sql: "DROP TABLE IF EXISTS mt_source"
