# Concurrent UPDATE contention coverage

metadata:
  version: "1.0"
  description: "Concurrent UPDATE contention: hot-row, 10x10 row workers, and full-table updates"
  isolated: true

test_cases:
  - name: "Hot-row setup"
    setup:
      - sql: "DROP TABLE IF EXISTS cu_hot"
      - sql: "CREATE TABLE cu_hot (id INT PRIMARY KEY, val INT)"
      - sql: "INSERT INTO cu_hot (id, val) VALUES (1, 0)"
    sql: "SELECT val FROM cu_hot WHERE id = 1"
    expect:
      rows: 1
      data:
        - val: 0

  - name: "Hot-row parallel update 1/10"
    parallel: hot_row
    sql: "UPDATE cu_hot SET val = val + 1 WHERE id = 1"
    expect:
      affected_rows: 1

  - name: "Hot-row parallel update 2/10"
    parallel: hot_row
    sql: "UPDATE cu_hot SET val = val + 1 WHERE id = 1"
    expect:
      affected_rows: 1

  - name: "Hot-row parallel update 3/10"
