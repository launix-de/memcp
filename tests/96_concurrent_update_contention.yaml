  - name: "Hot-row parallel update 10/10"
    parallel: hot_row
    sql: "UPDATE cu_hot SET val = val + 1 WHERE id = 1"
    expect:
      affected_rows: 1

  - name: "Hot-row verify"
    sql: "SELECT COUNT(*) AS c, SUM(val) AS s FROM cu_hot"
    expect:
      rows: 1
      data:
        - c: 1
          s: 10
    cleanup:
      - sql: "DROP TABLE IF EXISTS cu_hot"

