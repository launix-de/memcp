# Edge cases found during ERPL build-manual testing.
# Each test reproduces a specific SQL compatibility issue.

metadata:
  version: "1.0"
  description: "ERPL edge cases: correlated subquery alias scope, UPDATE with missing columns"

setup:
  - sql: "DROP TABLE IF EXISTS eec_state"
  - sql: "DROP TABLE IF EXISTS eec_record"
  - sql: "DROP TABLE IF EXISTS eec_tax"
  - sql: "DROP TABLE IF EXISTS eec_journal"
  - sql: |
      CREATE TABLE eec_state (
        ID INT PRIMARY KEY,
        name TEXT,
        aftercontact INT
      )
  - sql: |
      CREATE TABLE eec_record (
        ID INT PRIMARY KEY,
        state INT,
        title TEXT
      )
  - sql: |
      CREATE TABLE eec_tax (
        ID INT PRIMARY KEY,
        rate FLOAT,
        intl INT,
        svc INT,
        allnet INT
      )
  - sql: |
      CREATE TABLE eec_journal (
        ID INT PRIMARY KEY,
        ref1 INT,
        ref2 INT,
        parent INT
      )
  - sql: "INSERT INTO eec_state VALUES (1, 'New', NULL), (2, 'Called', 1), (3, 'Done', NULL)"
  - sql: "INSERT INTO eec_record VALUES (1, 1, 'Alpha'), (2, 2, 'Beta')"
  - sql: "INSERT INTO eec_tax VALUES (1, 19.0, 0, 0, 0), (2, 7.0, 1, 0, 0)"
  - sql: "INSERT INTO eec_journal VALUES (1, 10, NULL, NULL), (2, NULL, 20, NULL)"

test_cases:

  - name: "UPDATE with correlated subselect referencing alias from same table"
    sql: |
      UPDATE eec_state s1 SET name = CASE
        WHEN aftercontact IS NOT NULL THEN 'has_after'
        WHEN EXISTS (SELECT * FROM eec_state s2 WHERE s2.aftercontact = s1.ID) THEN 'is_after'
        ELSE 'none'
      END
    # On MySQL this works: s2 references eec_state with alias s2, s1 is the UPDATE target alias

  - name: "verify UPDATE with correlated subselect"
    sql: "SELECT ID, name FROM eec_state ORDER BY ID"
    expect:
      rows: 3
      data:
        - ID: 1
          name: "is_after"
        - ID: 2
          name: "has_after"
        - ID: 3
          name: "none"

  - name: "UPDATE SET with OR expression combining columns"
    sql: |
      UPDATE eec_tax SET allnet = intl OR svc
    # MySQL: allnet = (intl OR svc) → boolean 0/1

  - name: "verify UPDATE SET OR"
    sql: "SELECT ID, allnet FROM eec_tax ORDER BY ID"
    expect:
      rows: 2
      data:
        - ID: 1
          allnet: 0
        - ID: 2
          allnet: 1

  - name: "UPDATE SET with COALESCE over multiple nullable columns"
    sql: |
      UPDATE eec_journal SET parent = COALESCE(parent, ref1, ref2)

  - name: "verify COALESCE UPDATE"
    sql: "SELECT ID, parent FROM eec_journal ORDER BY ID"
    expect:
      rows: 2
      data:
        - ID: 1
          parent: 10
        - ID: 2
          parent: 20

  - name: "DROP COLUMN IF EXISTS on missing column (no error)"
    sql: "ALTER TABLE eec_state DROP COLUMN IF EXISTS aftercontact"

  - name: "DROP COLUMN IF EXISTS on already-dropped column (no error)"
    sql: "ALTER TABLE eec_state DROP COLUMN IF EXISTS aftercontact"

  - name: "SELECT after DROP COLUMN IF EXISTS"
    sql: "SELECT ID, name FROM eec_state ORDER BY ID"
    expect:
      rows: 3

cleanup:
  - sql: "DROP TABLE IF EXISTS eec_state"
  - sql: "DROP TABLE IF EXISTS eec_record"
  - sql: "DROP TABLE IF EXISTS eec_tax"
  - sql: "DROP TABLE IF EXISTS eec_journal"
