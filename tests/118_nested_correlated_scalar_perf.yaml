# Copyright (C) 2023-2026  Carl-Philip Hänsch
# Regression: a scalar subselect whose WHERE carries a correlated
# aggregate that itself carries two correlated scalar subselects must
# not blow up into a quadratic prejoin. This is the minimal reduction of
# the ERPL dashboard "reminderFop_journal_year_accountOpos" badge query,
# which was observed taking 3+ minutes for ~1600 rows. Per Neumann
# unnesting every nesting level decorrelates to a domain join; the plan
# must stay near-linear.

metadata:
  version: "1.0"
  description: "Nested correlated scalar-in-aggregate-in-scalar must stay fast"
  max_time: 2.0

