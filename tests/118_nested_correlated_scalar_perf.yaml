test_cases:
  - name: "nested correlated scalar-in-aggregate-in-scalar stays near-linear"
    max_time: 0.5
    sql: |
      SELECT
        (SELECT SUM(1) FROM ncs_acc OBJ WHERE OBJ.typ IN (4, 5) AND (
           (SELECT SUM(e.amount) FROM ncs_ent e
            WHERE e.account = OBJ.nummer
              AND (SELECT j.fyear FROM ncs_jrn j WHERE j.id = e.jrn LIMIT 1) = OBJ.year
              AND (SELECT j.storno FROM ncs_jrn j WHERE j.id = e.jrn LIMIT 1) = 0
            LIMIT 1) <> 0)
         LIMIT 1) AS reminderOpos
      FROM ncs_drv WHERE id = 1
    expect:
      rows: 1
      data:
        - reminderOpos: 50
