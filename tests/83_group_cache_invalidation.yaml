# Group table cache invalidation preparation tests
# Validates that GROUP BY results update correctly after DML on the base table.
# Also inspects keytable contents (noncritical) to prepare for subquery-cache.

metadata:
  version: "1.0"
  description: "GROUP BY cache invalidation: query, mutate base table, re-query"

test_cases:
  # --- Setup ---
  - name: "Create base table for group cache tests"
    sql: "CREATE TABLE sc_base (id INT PRIMARY KEY, dept VARCHAR(20), salary INT, active BOOL)"

  - name: "Insert initial data"
    sql: |
      INSERT INTO sc_base (id, dept, salary, active) VALUES
        (1, 'Engineering', 100, true),
        (2, 'Engineering', 200, true),
        (3, 'Sales', 150, true),
        (4, 'Sales', 50, false),
        (5, 'HR', 120, true)

  # --- Baseline GROUP BY queries ---
  - name: "Baseline: COUNT per dept"
    sql: "SELECT dept, COUNT(*) AS c FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          c: 2
        - dept: "HR"
          c: 1
        - dept: "Sales"
          c: 2

  - name: "Baseline: SUM(salary) per dept"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          s: 300
        - dept: "HR"
          s: 120
        - dept: "Sales"
          s: 200

  - name: "Baseline: SUM with HAVING"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept HAVING SUM(salary) > 150 ORDER BY dept"
    expect:
      rows: 2
      data:
        - dept: "Engineering"
          s: 300
        - dept: "Sales"
          s: 200

  - name: "Baseline: filtered aggregate (active only)"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base WHERE active = true GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          s: 300
        - dept: "HR"
          s: 120
        - dept: "Sales"
          s: 150

  # --- Inspect keytable after GROUP BY (noncritical) ---
  - name: "Keytable exists after GROUP BY and contains group keys"
    noncritical: true
    sql: "SELECT COUNT(*) AS c FROM `.sc_base:((get_column \"memcp-tests.sc_base\" false \"dept\" false))`"
    expect:
      rows: 1
      data:
        - c: 3

  # === INSERT new rows into base table ===
  - name: "Insert new Engineering employee"
    sql: "INSERT INTO sc_base (id, dept, salary, active) VALUES (6, 'Engineering', 300, true)"

  - name: "Insert new department"
    sql: "INSERT INTO sc_base (id, dept, salary, active) VALUES (7, 'Marketing', 80, true)"

  # --- Re-query after INSERT ---
  - name: "After INSERT: COUNT per dept"
    sql: "SELECT dept, COUNT(*) AS c FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          c: 3
        - dept: "HR"
          c: 1
        - dept: "Marketing"
          c: 1
        - dept: "Sales"
          c: 2

  - name: "After INSERT: SUM(salary) per dept"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          s: 600
        - dept: "HR"
          s: 120
        - dept: "Marketing"
          s: 80
        - dept: "Sales"
          s: 200

  - name: "After INSERT: SUM with HAVING"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept HAVING SUM(salary) > 150 ORDER BY dept"
    expect:
      rows: 2
      data:
        - dept: "Engineering"
          s: 600
        - dept: "Sales"
          s: 200

  - name: "Keytable updated after INSERT (new dept visible)"
    noncritical: true
    sql: "SELECT COUNT(*) AS c FROM `.sc_base:((get_column \"memcp-tests.sc_base\" false \"dept\" false))`"
    expect:
      rows: 1
      data:
        - c: 4

  # === UPDATE rows in base table ===
  - name: "Move employee from Sales to HR"
    sql: "UPDATE sc_base SET dept = 'HR' WHERE id = 3"

  - name: "After UPDATE: COUNT per dept"
    sql: "SELECT dept, COUNT(*) AS c FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          c: 3
        - dept: "HR"
          c: 2
        - dept: "Marketing"
          c: 1
        - dept: "Sales"
          c: 1

  - name: "After UPDATE: SUM(salary) per dept"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          s: 600
        - dept: "HR"
          s: 270
        - dept: "Marketing"
          s: 80
        - dept: "Sales"
          s: 50

  # === DELETE rows from base table ===
  - name: "Delete inactive employee"
    sql: "DELETE FROM sc_base WHERE id = 4"

  - name: "After DELETE: COUNT per dept (empty group removed)"
    sql: "SELECT dept, COUNT(*) AS c FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          c: 3
        - dept: "HR"
          c: 2
        - dept: "Marketing"
          c: 1

  - name: "After DELETE: SUM(salary) per dept (stale key removed)"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          s: 600
        - dept: "HR"
          s: 270
        - dept: "Marketing"
          s: 80

  - name: "Keytable has Sales key removed after DELETE (cleanup trigger)"
    noncritical: true
    sql: "SELECT COUNT(*) AS c FROM `.sc_base:((get_column \"memcp-tests.sc_base\" false \"dept\" false))`"
    expect:
      rows: 1
      data:
        - c: 3

  - name: "Delete all Sales employees to fully empty that group"
    sql: "DELETE FROM sc_base WHERE dept = 'Sales'"

  - name: "After full group deletion: empty group removed from keytable"
    sql: "SELECT dept, COUNT(*) AS c FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          c: 3
        - dept: "HR"
          c: 2
        - dept: "Marketing"
          c: 1

  # === Multi-column GROUP BY ===
  - name: "Multi-column GROUP BY baseline"
    sql: "SELECT dept, active, COUNT(*) AS c FROM sc_base GROUP BY dept, active ORDER BY dept, active"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          active: 1
          c: 3
        - dept: "HR"
          active: 1
          c: 2
        - dept: "Marketing"
          active: 1
          c: 1

  - name: "Insert inactive employee for multi-column group change"
    sql: "INSERT INTO sc_base (id, dept, salary, active) VALUES (8, 'Engineering', 50, false)"

  - name: "Multi-column GROUP BY after INSERT (new active=false group)"
    sql: "SELECT dept, active, COUNT(*) AS c FROM sc_base GROUP BY dept, active ORDER BY dept, active"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          active: 0
          c: 1
        - dept: "Engineering"
          active: 1
          c: 3
        - dept: "HR"
          active: 1
          c: 2
        - dept: "Marketing"
          active: 1
          c: 1

  # === UPDATE group key to BRAND NEW value ===
  # State: Engineering(4,650), HR(2,270), Marketing(1,80)
  - name: "UPDATE group key to brand new value"
    sql: "UPDATE sc_base SET dept = 'Legal' WHERE id = 7"

  - name: "After UPDATE to new key: old group disappears, new group appears"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          s: 650
        - dept: "HR"
          s: 270
        - dept: "Legal"
          s: 80

  # === Re-insert into emptied group ===
  - name: "Re-insert into emptied group (Marketing was emptied above)"
    sql: "INSERT INTO sc_base (id, dept, salary, active) VALUES (9, 'Marketing', 200, true)"

  - name: "After re-insert: emptied group reappears"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          s: 650
        - dept: "HR"
          s: 270
        - dept: "Legal"
          s: 80
        - dept: "Marketing"
          s: 200

  # === UPDATE non-key non-aggregate column ===
  - name: "UPDATE non-key non-aggregate column (active flag)"
    sql: "UPDATE sc_base SET active = false WHERE id = 1"

  - name: "After non-key UPDATE: aggregates unchanged"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 4
      data:
        - dept: "Engineering"
          s: 650
        - dept: "HR"
          s: 270
        - dept: "Legal"
          s: 80
        - dept: "Marketing"
          s: 200

  # === Bulk UPDATE affecting multiple groups ===
  - name: "Bulk UPDATE: move Legal employees to HR"
    sql: "UPDATE sc_base SET dept = 'HR' WHERE dept = 'Legal'"

  - name: "After bulk UPDATE: Legal gone, HR grew"
    sql: "SELECT dept, SUM(salary) AS s FROM sc_base GROUP BY dept ORDER BY dept"
    expect:
      rows: 3
      data:
        - dept: "Engineering"
          s: 650
        - dept: "HR"
          s: 350
        - dept: "Marketing"
          s: 200

  # === Multi-table GROUP BY (prejoin path) ===
  - name: "Create lookup table for prejoin test"
    sql: "CREATE TABLE sc_dept (id INT PRIMARY KEY, name VARCHAR(20), region VARCHAR(20))"

  - name: "Create employee table for prejoin test"
    sql: "CREATE TABLE sc_emp (id INT PRIMARY KEY, dept_id INT, salary INT)"

  - name: "Insert departments"
    sql: "INSERT INTO sc_dept (id, name, region) VALUES (1, 'Engineering', 'West'), (2, 'Sales', 'East')"

  - name: "Insert employees"
    sql: "INSERT INTO sc_emp (id, dept_id, salary) VALUES (1, 1, 100), (2, 1, 200), (3, 2, 150)"

  - name: "Prejoin GROUP BY baseline"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 2
      data:
        - name: "Engineering"
          s: 300
        - name: "Sales"
          s: 150

  - name: "Insert new employee into existing dept"
    sql: "INSERT INTO sc_emp (id, dept_id, salary) VALUES (4, 2, 250)"

  - name: "Prejoin GROUP BY after INSERT"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 2
      data:
        - name: "Engineering"
          s: 300
        - name: "Sales"
          s: 400

  - name: "Insert new department and employee"
    sql: "INSERT INTO sc_dept (id, name, region) VALUES (3, 'HR', 'Central')"

  - name: "Insert employee for new department"
    sql: "INSERT INTO sc_emp (id, dept_id, salary) VALUES (5, 3, 120)"

  - name: "Prejoin GROUP BY with new department"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 3
      data:
        - name: "Engineering"
          s: 300
        - name: "HR"
          s: 120
        - name: "Sales"
          s: 400

  - name: "Delete employee and re-query prejoin GROUP BY"
    sql: "DELETE FROM sc_emp WHERE id = 4"

  - name: "Prejoin GROUP BY after DELETE"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 3
      data:
        - name: "Engineering"
          s: 300
        - name: "HR"
          s: 120
        - name: "Sales"
          s: 150

  # === Prejoin: UPDATE join key in fact table ===
  # State: dept(1=Eng,2=Sales,3=HR), emp(1→1,2→1,3→2,5→3)
  - name: "Prejoin: UPDATE join key (move emp from HR to Sales)"
    sql: "UPDATE sc_emp SET dept_id = 2 WHERE id = 5"

  - name: "Prejoin GROUP BY after FK UPDATE"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 2
      data:
        - name: "Engineering"
          s: 300
        - name: "Sales"
          s: 270

  # === Prejoin: UPDATE in lookup table (rename department) ===
  - name: "Prejoin: UPDATE lookup table (rename Engineering to R&D)"
    sql: "UPDATE sc_dept SET name = 'R&D' WHERE id = 1"

  - name: "Prejoin GROUP BY after lookup UPDATE"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 2
      data:
        - name: "R&D"
          s: 300
        - name: "Sales"
          s: 270

  # === Prejoin: DELETE from lookup table ===
  - name: "Add temporary department with employee"
    sql: "INSERT INTO sc_dept (id, name, region) VALUES (4, 'Ops', 'North')"
  - name: "Add employee in temporary department"
    sql: "INSERT INTO sc_emp (id, dept_id, salary) VALUES (6, 4, 75)"

  - name: "Prejoin GROUP BY with new department"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 3
      data:
        - name: "Ops"
          s: 75
        - name: "R&D"
          s: 300
        - name: "Sales"
          s: 270

  - name: "Prejoin: DELETE from lookup table (drop department)"
    sql: "DELETE FROM sc_dept WHERE id = 4"

  - name: "Prejoin GROUP BY after lookup DELETE (Ops employee orphaned)"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 2
      data:
        - name: "R&D"
          s: 300
        - name: "Sales"
          s: 270

  # =============================================================
  # Cache hit: identical query twice with no DML between
  # =============================================================

  - name: "Setup cache hit test table"
    sql: "DROP TABLE IF EXISTS sc_hit"
  - name: "Create cache hit test table"
    sql: "CREATE TABLE sc_hit (id INT PRIMARY KEY, grp VARCHAR(10), val INT)"
  - name: "Insert cache hit test data"
    sql: "INSERT INTO sc_hit VALUES (1,'A',10),(2,'A',20),(3,'B',30)"

  - name: "Cache hit: first query computes"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 30
        - grp: "B"
          s: 30

  - name: "Cache hit: identical query returns same result from cache"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 30
        - grp: "B"
          s: 30

  - name: "Cache hit: COUNT variant also cached independently"
    sql: "SELECT grp, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          c: 2
        - grp: "B"
          c: 1

  - name: "Cache hit: COUNT re-query from cache"
    sql: "SELECT grp, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          c: 2
        - grp: "B"
          c: 1

  # =============================================================
  # Multiple aggregates in one query: SUM + COUNT
  # =============================================================

  - name: "Multi-agg baseline: SUM and COUNT together"
    sql: "SELECT grp, SUM(val) AS s, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 30
          c: 2
        - grp: "B"
          s: 30
          c: 1

  - name: "Multi-agg: mutate then both must update"
    sql: "INSERT INTO sc_hit VALUES (4,'B',70)"

  - name: "Multi-agg after INSERT: both SUM and COUNT updated"
    sql: "SELECT grp, SUM(val) AS s, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 30
          c: 2
        - grp: "B"
          s: 100
          c: 2

  # =============================================================
  # Interleaved GROUP BY on different columns
  # =============================================================

  - name: "Setup interleaved test table"
    sql: "DROP TABLE IF EXISTS sc_inter"
  - name: "Create interleaved test table"
    sql: "CREATE TABLE sc_inter (id INT PRIMARY KEY, color VARCHAR(10), size VARCHAR(10), qty INT)"
  - name: "Insert interleaved test data"
    sql: "INSERT INTO sc_inter VALUES (1,'red','S',1),(2,'red','M',2),(3,'blue','S',3),(4,'blue','M',4)"

  - name: "Interleaved: GROUP BY color"
    sql: "SELECT color, SUM(qty) AS s FROM sc_inter GROUP BY color ORDER BY color"
    expect:
      rows: 2
      data:
        - color: "blue"
          s: 7
        - color: "red"
          s: 3

  - name: "Interleaved: GROUP BY size"
    sql: "SELECT size, SUM(qty) AS s FROM sc_inter GROUP BY size ORDER BY size"
    expect:
      rows: 2
      data:
        - size: "M"
          s: 6
        - size: "S"
          s: 4

  - name: "Interleaved: mutate base table"
    sql: "INSERT INTO sc_inter VALUES (5,'red','S',10)"

  - name: "Interleaved: GROUP BY color after INSERT"
    sql: "SELECT color, SUM(qty) AS s FROM sc_inter GROUP BY color ORDER BY color"
    expect:
      rows: 2
      data:
        - color: "blue"
          s: 7
        - color: "red"
          s: 13

  - name: "Interleaved: GROUP BY size after INSERT"
    sql: "SELECT size, SUM(qty) AS s FROM sc_inter GROUP BY size ORDER BY size"
    expect:
      rows: 2
      data:
        - size: "M"
          s: 6
        - size: "S"
          s: 14

  # =============================================================
  # Filtered aggregate cache hit + invalidation
  # =============================================================

  - name: "Filtered agg: WHERE + GROUP BY baseline"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit WHERE val > 15 GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 20
        - grp: "B"
          s: 100

  - name: "Filtered agg: same query again (cache hit)"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit WHERE val > 15 GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 20
        - grp: "B"
          s: 100

  - name: "Filtered agg: mutate base"
    sql: "INSERT INTO sc_hit VALUES (5,'A',50)"

  - name: "Filtered agg: after INSERT, filtered result updates"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit WHERE val > 15 GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 70
        - grp: "B"
          s: 100

  # =============================================================
  # UPDATE within same group (no key change, value change)
  # =============================================================

  - name: "Same-group UPDATE: change val without changing grp"
    sql: "UPDATE sc_hit SET val = 99 WHERE id = 1"

  - name: "Same-group UPDATE: SUM reflects new value"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 169
        - grp: "B"
          s: 100

  - name: "Same-group UPDATE: COUNT unchanged"
    sql: "SELECT grp, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          c: 3
        - grp: "B"
          c: 2

  # =============================================================
  # DELETE leaving group non-empty (key stays, value updates)
  # =============================================================
  # sc_hit state: A(id=1:99, id=2:20, id=5:50), B(id=3:30, id=4:70)

  - name: "DELETE from non-empty group: remove one of three"
    sql: "DELETE FROM sc_hit WHERE id = 5"

  - name: "After partial DELETE: group A still exists with updated SUM"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          s: 119
        - grp: "B"
          s: 100

  - name: "After partial DELETE: COUNT decremented"
    sql: "SELECT grp, COUNT(*) AS c FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 2
      data:
        - grp: "A"
          c: 2
        - grp: "B"
          c: 2

  # =============================================================
  # DELETE all from one group (key removed, other groups intact)
  # =============================================================

  - name: "DELETE all from group B"
    sql: "DELETE FROM sc_hit WHERE grp = 'B'"

  - name: "After full group DELETE: B gone, A intact"
    sql: "SELECT grp, SUM(val) AS s FROM sc_hit GROUP BY grp ORDER BY grp"
    expect:
      rows: 1
      data:
        - grp: "A"
          s: 119

  # =============================================================
  # Multi-column GROUP BY: DELETE + UPDATE on composite keys
  # =============================================================
  # sc_inter state: red/S(1:1, 5:10), red/M(2:2), blue/S(3:3), blue/M(4:4)

  - name: "Multi-col DELETE: remove the only blue/M entry"
    sql: "DELETE FROM sc_inter WHERE id = 4"

  - name: "After multi-col DELETE: blue/M group removed"
    sql: "SELECT color, size, SUM(qty) AS s FROM sc_inter GROUP BY color, size ORDER BY color, size"
    expect:
      rows: 3
      data:
        - color: "blue"
          size: "S"
          s: 3
        - color: "red"
          size: "M"
          s: 2
        - color: "red"
          size: "S"
          s: 11

  - name: "Multi-col UPDATE: change key to new composite (blue/S -> green/L)"
    sql: "UPDATE sc_inter SET color = 'green', size = 'L' WHERE id = 3"

  - name: "After multi-col UPDATE: blue/S gone, green/L appears"
    sql: "SELECT color, size, SUM(qty) AS s FROM sc_inter GROUP BY color, size ORDER BY color, size"
    expect:
      rows: 3
      data:
        - color: "green"
          size: "L"
          s: 3
        - color: "red"
          size: "M"
          s: 2
        - color: "red"
          size: "S"
          s: 11

  # =============================================================
  # Prejoin: DELETE all employees from one department
  # =============================================================
  # sc_emp state: 1→1(Eng), 2→1(Eng), 3→2(Sales), 5→2(Sales), 6→4(orphan)
  # sc_dept: 1=R&D, 2=Sales, 3=HR, 4=deleted

  - name: "Prejoin: delete all R&D employees"
    sql: "DELETE FROM sc_emp WHERE dept_id = 1"

  - name: "Prejoin after deleting all from dept: R&D gone"
    sql: "SELECT d.name, SUM(e.salary) AS s FROM sc_emp e JOIN sc_dept d ON d.id = e.dept_id GROUP BY d.name ORDER BY d.name"
    expect:
      rows: 1
      data:
        - name: "Sales"
          s: 270

  # --- Cleanup ---
  - name: "Cleanup sc_base"
    sql: "DROP TABLE IF EXISTS sc_base"

  - name: "Cleanup sc_dept"
    sql: "DROP TABLE IF EXISTS sc_dept"

  - name: "Cleanup sc_emp"
    sql: "DROP TABLE IF EXISTS sc_emp"

  - name: "Cleanup sc_hit"
    sql: "DROP TABLE IF EXISTS sc_hit"

  - name: "Cleanup sc_inter"
    sql: "DROP TABLE IF EXISTS sc_inter"
