# GRANT/REVOKE Test Suite

metadata:
  version: "1.0"
  description: "User privileges: GRANT and REVOKE"

setup:
  - sql: "DELETE FROM `system`.`access` WHERE username='alice'"
    expect: {}
  - sql: "DELETE FROM `system`.`user` WHERE username='alice'"
    expect: {}
  - sql: "DELETE FROM `system`.`access` WHERE username='psqlalice'"
    expect: {}
  - sql: "DELETE FROM `system`.`user` WHERE username='psqlalice'"
    expect: {}
  - sql: "DELETE FROM `system`.`access` WHERE username='psqlrole'"
    expect: {}
  - sql: "DELETE FROM `system`.`user` WHERE username='psqlrole'"
    expect: {}

test_cases:
  - name: "CREATE USER alice"
    sql: "CREATE USER alice IDENTIFIED BY 'pw'"
    expect:
      affected_rows: 1

  - name: "GRANT ALL ON *.* sets admin"
    sql: "GRANT ALL ON *.* TO alice"
    expect: {}

  - name: "admin flag is true after grant"
    sql: "SELECT admin FROM system.user WHERE username = 'alice'"
    expect:
      rows: 1
      data:
        - { admin: true }

  - name: "REVOKE ALL ON *.* clears admin"
    sql: "REVOKE ALL ON *.* FROM alice"
    expect: {}

  - name: "admin flag is false after revoke"
    sql: "SELECT admin FROM system.user WHERE username = 'alice'"
    expect:
      rows: 1
      data:
        - { admin: false }

  - name: "GRANT db access creates system.access entry"
    sql: "GRANT ALL PRIVILEGES ON `memcp-tests`.* TO alice"
    expect: {}

  - name: "Verify access entry exists"
    sql: "SELECT database FROM system.access WHERE username='alice' AND database='memcp-tests'"
    expect:
      rows: 1
      data:
        - { database: "memcp-tests" }

  - name: "REVOKE db access removes entry"
    sql: "REVOKE ALL PRIVILEGES ON `memcp-tests`.* FROM alice"
    expect:
      affected_rows: 1

  - name: "Verify access entry removed"
    sql: "SELECT database FROM system.access WHERE username='alice' AND database='memcp-tests'"
    expect:
      rows: 0

  # Policy enforcement tests (per-user auth)
  - name: "prepare table t as root (create)"
    sql: "CREATE TABLE grant_t(id INT, name TEXT)"
    expect: {}

  - name: "prepare table t as root (insert)"
    sql: "INSERT INTO grant_t(id, name) VALUES (1, 'x')"
    expect: { affected_rows: 1 }

  - name: "alice cannot read without grant"
    username: "alice"
    password: "pw"
    sql: "SELECT * FROM grant_t"
    expect:
      error: true

  - name: "grant db access to alice"
    sql: "GRANT SELECT ON `memcp-tests`.* TO alice"
    expect: {}

  - name: "alice can read after grant"
    username: "alice"
    password: "pw"
    sql: "SELECT id, name FROM grant_t"
    expect:
      rows: 1
      data:
        - { id: 1, name: "x" }

  - name: "revoke db access from alice"
    sql: "REVOKE SELECT ON `memcp-tests`.* FROM alice"
    expect: { affected_rows: 1 }

  # === PostgreSQL user/role management via psql parser ===
  - name: "psql CREATE USER WITH PASSWORD"
    syntax: postgresql
    sql: "CREATE USER psqlalice WITH PASSWORD 'pw'"
    expect:
      affected_rows: 1

  - name: "psql user exists after CREATE"
    sql: "SELECT username FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { username: psqlalice }

  - name: "psql ALTER USER WITH PASSWORD"
    syntax: postgresql
    sql: "ALTER USER psqlalice WITH PASSWORD 'newpw'"
    expect: {}

  - name: "psql ALTER USER SUPERUSER sets admin"
    syntax: postgresql
    sql: "ALTER USER psqlalice SUPERUSER"
    expect: {}

  - name: "admin is true after SUPERUSER"
    sql: "SELECT admin FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { admin: true }

  - name: "psql ALTER USER NOSUPERUSER clears admin"
    syntax: postgresql
    sql: "ALTER USER psqlalice NOSUPERUSER"
    expect: {}

  - name: "admin is false after NOSUPERUSER"
    sql: "SELECT admin FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { admin: false }

  - name: "psql GRANT ALL ON *.* sets admin"
    syntax: postgresql
    sql: "GRANT ALL PRIVILEGES ON *.* TO psqlalice"
    expect: {}

  - name: "admin is true after psql GRANT ALL ON *.*"
    sql: "SELECT admin FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { admin: true }

  - name: "psql REVOKE ALL ON *.* clears admin"
    syntax: postgresql
    sql: "REVOKE ALL PRIVILEGES ON *.* FROM psqlalice"
    expect: {}

  - name: "admin is false after psql REVOKE ALL ON *.*"
    sql: "SELECT admin FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { admin: false }

  - name: "psql DROP USER cascades to access"
    sql: "GRANT ALL PRIVILEGES ON `memcp-tests`.* TO psqlalice"
    expect: {}

  - name: "psql DROP USER (via psql parser)"
    syntax: postgresql
    sql: "DROP USER psqlalice"
    expect: {}

  - name: "access entry gone after psql DROP USER"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { cnt: 0 }

  - name: "user row gone after psql DROP USER"
    sql: "SELECT COUNT(*) AS cnt FROM system.user WHERE username='psqlalice'"
    expect:
      rows: 1
      data:
        - { cnt: 0 }

  - name: "psql CREATE ROLE"
    syntax: postgresql
    sql: "CREATE ROLE psqlrole WITH LOGIN PASSWORD 'pw'"
    expect:
      affected_rows: 1

  - name: "psql DROP ROLE cascades to access"
    sql: "GRANT ALL PRIVILEGES ON `memcp-tests`.* TO psqlrole"
    expect: {}

  - name: "psql DROP ROLE (via psql parser)"
    syntax: postgresql
    sql: "DROP ROLE psqlrole"
    expect: {}

  - name: "role and access gone after DROP ROLE"
    sql: "SELECT COUNT(*) AS cnt FROM system.user WHERE username='psqlrole'"
    expect:
      rows: 1
      data:
        - { cnt: 0 }

  # === PostgreSQL permissions syntax (no-ops beyond db access) ===
  - name: "psql grant connect on database (db access)"
    syntax: postgresql
    sql: "GRANT CONNECT ON DATABASE \"memcp-tests\" TO alice"
    expect:
      affected_rows: 1

  - name: "psql revoke connect on database (db access)"
    syntax: postgresql
    sql: "REVOKE CONNECT ON DATABASE \"memcp-tests\" FROM alice"
    expect:
      affected_rows: 1

  - name: "psql grant usage on schema (noop)"
    syntax: postgresql
    sql: "GRANT USAGE ON SCHEMA public TO alice"
    expect:
      affected_rows: 1

  - name: "psql grant select on table (noop)"
    syntax: postgresql
    sql: "GRANT SELECT ON TABLE grant_t TO alice"
    expect:
      error: true

  - name: "psql revoke select on table (noop)"
    syntax: postgresql
    sql: "REVOKE SELECT ON TABLE grant_t FROM alice"
    expect:
      error: true

  - name: "psql grant all on all tables in schema (noop)"
    syntax: postgresql
    sql: "GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO alice"
    expect:
      affected_rows: 1

  - name: "psql revoke all on all tables in schema (noop)"
    syntax: postgresql
    sql: "REVOKE ALL PRIVILEGES ON ALL TABLES IN SCHEMA public FROM alice"
    expect: {}

  # === UNIQUE constraint on system.access ===
  - name: "duplicate GRANT does not create second access entry"
    sql: "GRANT ALL PRIVILEGES ON `memcp-tests`.* TO alice"
    expect: {}
  - name: "second GRANT: still only one access row"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='alice' AND database='memcp-tests'"
    expect:
      rows: 1
      data:
        - { cnt: 1 }
  - name: "cleanup duplicate grant"
    sql: "REVOKE ALL PRIVILEGES ON `memcp-tests`.* FROM alice"
    expect: { affected_rows: 1 }

  # === DROP USER cascades to system.access ===
  - name: "grant access to alice before drop"
    sql: "GRANT ALL PRIVILEGES ON `memcp-tests`.* TO alice"
    expect: {}
  - name: "verify access entry exists before drop"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='alice'"
    expect:
      rows: 1
      data:
        - { cnt: 1 }
  - name: "DROP USER alice removes access entries too"
    sql: "DROP USER alice"
    expect: {}
  - name: "access entry gone after DROP USER"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='alice'"
    expect:
      rows: 1
      data:
        - { cnt: 0 }

  # === DROP DATABASE cascades to system.access ===
  - name: "create user bob for db-drop test"
    sql: "CREATE USER bob IDENTIFIED BY 'pw'"
    expect: { affected_rows: 1 }
  - name: "create database to drop"
    sql: "CREATE DATABASE drop_test_db"
    expect: {}
  - name: "grant bob access to drop_test_db"
    sql: "GRANT ALL PRIVILEGES ON `drop_test_db`.* TO bob"
    expect: {}
  - name: "verify access entry before drop db"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='bob' AND database='drop_test_db'"
    expect:
      rows: 1
      data:
        - { cnt: 1 }
  - name: "DROP DATABASE removes access entries"
    sql: "DROP DATABASE drop_test_db"
    expect: {}
  - name: "access entry gone after DROP DATABASE"
    sql: "SELECT COUNT(*) AS cnt FROM system.access WHERE username='bob' AND database='drop_test_db'"
    expect:
      rows: 1
      data:
        - { cnt: 0 }

cleanup:
  - sql: "DROP USER IF EXISTS alice"
  - sql: "DROP USER IF EXISTS bob"
  - sql: "DROP USER IF EXISTS psqlalice"
  - sql: "DROP USER IF EXISTS psqlrole"
  - sql: "DROP DATABASE IF EXISTS drop_test_db"
