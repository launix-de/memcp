# Derived table with window function used in a query with GROUP BY/COUNT.
# The materialized derived table must work correctly when the outer query
# aggregates over it. Pattern: SELECT COUNT(*), SUM(val) FROM (
#   SELECT ..., (SELECT sub.col FROM (SELECT ..., ROW_NUMBER() OVER (...) AS rn
#     FROM hist) sub WHERE sub.parent = main.ID AND sub.rn = 1) AS dynamic_val
#   FROM main) t

metadata:
  version: "1.0"
  description: "Window function derived table in GROUP BY context"

setup:
  - sql: "DROP TABLE IF EXISTS wgd_main"
  - sql: "DROP TABLE IF EXISTS wgd_hist"
  - sql: |
      CREATE TABLE wgd_main (
        ID INT PRIMARY KEY,
        name TEXT,
        category INT
      )
  - sql: |
      CREATE TABLE wgd_hist (
        ID INT PRIMARY KEY,
        parent INT,
        val INT,
        ts INT
      )
  - sql: "INSERT INTO wgd_main VALUES (1, 'Alice', 1), (2, 'Bob', 1), (3, 'Carol', 2)"
  - sql: "INSERT INTO wgd_hist VALUES (1, 1, 100, 1000), (2, 1, 200, 2000), (3, 2, 150, 1500), (4, 3, 300, 3000)"

test_cases:

  - name: "scalar subselect with window function (no GROUP BY)"
    sql: |
      SELECT m.ID, m.name,
        (SELECT sub.val FROM (
          SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
          FROM wgd_hist
        ) sub WHERE sub.parent = m.ID AND sub.rn = 1) AS latest_val
      FROM wgd_main m
      ORDER BY m.ID
    expect:
      rows: 3
      data:
        - ID: 1
          name: "Alice"
          latest_val: 200
        - ID: 2
          name: "Bob"
          latest_val: 150
        - ID: 3
          name: "Carol"
          latest_val: 300

  - name: "derived table wrapping scalar subselect with window function"
    sql: |
      SELECT t.* FROM (
        SELECT m.ID AS ID, m.name AS name, m.category AS category,
          COALESCE((SELECT sub.val FROM (
            SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
            FROM wgd_hist
          ) sub WHERE sub.parent = m.ID AND sub.rn = 1), 0) AS latest_val
        FROM wgd_main m
      ) t ORDER BY t.ID
    expect:
      rows: 3
      data:
        - ID: 1
          name: "Alice"
          category: 1
          latest_val: 200
        - ID: 2
          name: "Bob"
          category: 1
          latest_val: 150
        - ID: 3
          name: "Carol"
          category: 2
          latest_val: 300

  - name: "COUNT + SUM over derived table with window function scalar subselect"
    sql: |
      SELECT COUNT(*) AS cnt, SUM(t.latest_val) AS total FROM (
        SELECT m.ID AS ID,
          COALESCE((SELECT sub.val FROM (
            SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
            FROM wgd_hist
          ) sub WHERE sub.parent = m.ID AND sub.rn = 1), 0) AS latest_val
        FROM wgd_main m
      ) t
    expect:
      rows: 1
      data:
        - cnt: 3
          total: 650

  - name: "GROUP BY category over derived table with window function"
    sql: |
      SELECT t.category, COUNT(*) AS cnt, SUM(t.latest_val) AS total FROM (
        SELECT m.ID AS ID, m.category AS category,
          COALESCE((SELECT sub.val FROM (
            SELECT parent, val, ROW_NUMBER() OVER (PARTITION BY parent ORDER BY ts DESC) AS rn
            FROM wgd_hist
          ) sub WHERE sub.parent = m.ID AND sub.rn = 1), 0) AS latest_val
        FROM wgd_main m
      ) t GROUP BY t.category ORDER BY t.category
    expect:
      rows: 2
      data:
        - category: 1
          cnt: 2
          total: 350
        - category: 2
          cnt: 1
          total: 300

cleanup:
  - sql: "DROP TABLE IF EXISTS wgd_main"
  - sql: "DROP TABLE IF EXISTS wgd_hist"
